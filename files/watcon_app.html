// ── New Item Form ──────────────────────────────────────────────────
function NewItemForm({onSave,onCancel}){
  const [form,setForm]=useState({name:'',unit:'SQM',brand:'',deliveryDays:14,purchasePrice:0,sellingPrice:0,stock:0,isImported:false,image:null,variations:[],importCurrency:'USD',importPrice:0,exchangeRate:83,discount:0,transportType:'lumpsum',transport:0,customDuty:0,profitMultiplier:1.3});
  const [nv,setNv]=useState({size:'',finish:'',make:'',brand:''});
  const fileRef=useRef();
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  const addVar=()=>{
    if(!nv.size&&!nv.finish&&!nv.make)return;
    setForm(f=>({...f,variations:[...f.variations,{...nv}]}));
    setNv({size:'',finish:'',make:'',brand:''});
  };
  const remVar=i=>setForm(f=>({...f,variations:f.variations.filter((_,j)=>j!==i)}));

  const handleImg=ev=>{
    const f=ev.target.files[0];if(!f)return;
    const rd=new FileReader();rd.onload=e=>up('image',e.target.result);rd.readAsDataURL(f);
  };

  const handleSave=()=>{
    if(!form.name.trim()){alert('Please enter an item name');return;}
    let pp=parseFloat(form.purchasePrice)||0;
    let sp=parseFloat(form.sellingPrice)||0;
    if(form.isImported){const r=calcImport(form);pp=Math.round(r.wd);sp=Math.round(r.sell);}

    // build parent item + one child per variation
    const parentId='ITM-'+String(Date.now()).slice(-4);
    const items=[];
    const base={...form,purchasePrice:pp,sellingPrice:sp,history:[],stockLog:[],lastPurchase:{date:today,price:pp,supplier:'—'},variations:[]};

    if(form.variations.length===0){
      items.push({...base,id:parentId,parentId:null,variantLabel:''});
    } else {
      // parent (template, no stock)
      items.push({...base,id:parentId,parentId:null,variantLabel:'',stock:0,isTemplate:true});
      // each variation becomes its own item
      form.variations.forEach((v,i)=>{
        const vLabel=[v.size,v.finish,v.make,v.brand].filter(Boolean).join(' · ');
        items.push({...base,id:parentId+'-V'+(i+1),parentId:parentId,variantLabel:vLabel,stock:0});
      });
    }
    onSave(items);
  };

  return e('div',null,
    e('div',{className:'back-row'},
      e('button',{className:'btn-ghost',onClick:onCancel},'← Cancel'),
      e('span',{style:{fontSize:9,letterSpacing:'0.4em',color:'#aaa',textTransform:'uppercase'}},'New Item')
    ),
    e('div',{className:'det-layout'},
      e('div',null,
        e('div',{className:'upload-box',onClick:()=>fileRef.current.click()},
          form.image?e('img',{src:form.image})
            :e('div',{className:'upload-hint'},e('div',{style:{fontSize:24,color:'#ddd',marginBottom:6}},'⊕'),e('div',null,'Upload Photo'))
        ),
        e('input',{ref:fileRef,type:'file',accept:'image/*',onChange:handleImg,style:{display:'none'}}),
        e('div',{style:{marginBottom:12}},
          e('label',{className:'lbl'},'Item Type'),
          e('div',{className:'type-toggle'},
            e('button',{className:'type-btn'+(form.isImported?'':' active'),onClick:()=>up('isImported',false)},'Domestic'),
            e('button',{className:'type-btn'+(form.isImported?' active':''),onClick:()=>up('isImported',true)},'Imported')
          )
        ),
        form.variations.length>0&&e('div',{style:{background:'#f0f7e8',border:'1px solid #c0d898',padding:'10px 12px',fontSize:10,color:'#3a6010',lineHeight:1.6}},
          e('strong',null,form.variations.length+' variation'+(form.variations.length>1?'s':''),' will become '+form.variations.length+' separate item'+(form.variations.length>1?'s':'')+' linked to this parent.')
        )
      ),
      e('div',null,
        e('div',{className:'panel'},
          e('div',{className:'panel-title'},e('span',null,'Basic Information')),
          e('div',{style:{marginBottom:14}},
            e('label',{className:'lbl'},'Item Name'),
            e('input',{className:'field-input',value:form.name,onChange:ev=>up('name',ev.target.value),placeholder:'Enter full item name',style:{fontSize:14}})
          ),
          e('div',{className:'g2'},
            e(FInput,{label:'Brand',value:form.brand,onChange:v=>up('brand',v),placeholder:'Brand'}),
            e(FSelect,{label:'Unit',value:form.unit,onChange:v=>up('unit',v),opts:['SQM','SQF','PCS','BOX','KG','MTR','LTR','SET','NOS']}),
            e(FInput,{label:'Delivery (days)',value:form.deliveryDays,onChange:v=>up('deliveryDays',v),type:'number'}),
            e(FInput,{label:'Opening Stock',value:form.stock,onChange:v=>up('stock',v),type:'number',placeholder:'0'})
          ),
          !form.isImported&&e('div',{className:'g2',style:{marginTop:14}},
            e(FInput,{label:'Purchase Price (₹) per '+form.unit,value:form.purchasePrice,onChange:v=>up('purchasePrice',v),type:'number'}),
            e(FInput,{label:'Selling Price (₹) per '+form.unit,value:form.sellingPrice,onChange:v=>up('sellingPrice',v),type:'number'})
          )
        ),
        form.isImported&&e(PriceCalc,{form,setForm,editable:true}),
        e('div',{className:'panel'},
          e('div',{className:'panel-title'},e('span',null,'Variations — each becomes a separate item')),
          e('div',{className:'var-add-row'},
            ...['size','finish','make','brand'].map(k=>
              e('input',{key:k,className:'field-input',placeholder:k.charAt(0).toUpperCase()+k.slice(1),value:nv[k],onChange:ev=>setNv(v=>({...v,[k]:ev.target.value})),
                onKeyDown:ev=>{if(ev.key==='Enter')addVar();}})
            ),
            e('button',{className:'btn btn-primary',onClick:addVar,style:{padding:'0',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}},'+')
          ),
          form.variations.length===0
            ?e('div',{style:{fontSize:10,color:'#ccc',letterSpacing:'0.2em',padding:'6px 0'}},'No variations added — item will be created as-is')
            :e('div',{className:'var-chips'},
              ...form.variations.map((v,i)=>e('div',{className:'var-chip',key:i},
                e('span',null,[v.size,v.finish,v.make,v.brand].filter(Boolean).join(' · ')),
                e('button',{onClick:()=>remVar(i)},'×')
              ))
            )
        )
      )
    ),
    e('div',{className:'actions-row'},
      e('button',{className:'btn-ghost',onClick:onCancel},'Cancel'),
      form.isImported&&e('button',{className:'btn-ghost',onClick:()=>{
        const r=calcImport(form);setForm(f=>({...f,purchasePrice:Math.round(r.wd),sellingPrice:Math.round(r.sell)}));
      }},'↻ Recalculate'),
      e('button',{className:'btn btn-primary',onClick:handleSave},'Save Item →')
    )
  );
}

// ── App ────────────────────────────────────────────────────────────
function App(){
  const [items,setItems]=useState(SEED);
  const [view,setView]=useState('list');
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [role,setRole]=useState('admin'); // toggle for demo

  const filtered=items.filter(item=>{
    const ms=item.name.toLowerCase().includes(search.toLowerCase())||item.id.toLowerCase().includes(search.toLowerCase())||(item.variantLabel||'').toLowerCase().includes(search.toLowerCase());
    const mi=filter==='all'||(filter==='imported'?item.isImported:!item.isImported);
    const mv=filter==='variants'?!!item.parentId:true;
    return ms&&mi&&mv&&!item.isTemplate;
  });

  const openItem=item=>{setSelected(item);setView('detail');};

  const handleUpdate=updated=>{
    setItems(prev=>prev.map(i=>i.id===updated.id?updated:i));
    setSelected(updated);
  };

  const handleStockAdjust=(itemId,type,qty,reason)=>{
    setItems(prev=>prev.map(i=>{
      if(i.id!==itemId)return i;
      const newStock=type==='add'?i.stock+qty:Math.max(0,i.stock-qty);
      const log={date:today,type,qty,reason};
      return{...i,stock:newStock,stockLog:[...(i.stockLog||[]),log]};
    }));
    setSelected(prev=>({...prev,
      stock:type==='add'?prev.stock+qty:Math.max(0,prev.stock-qty),
      stockLog:[...(prev.stockLog||[]),{date:today,type,qty,reason}]
    }));
  };

  const saveNew=newItems=>{
    setItems(prev=>[...newItems,...prev]);
    setView('list');
  };

  return e('div',null,
    e('div',{className:'topbar'},
      e('div',{style:{display:'flex',alignItems:'center'}},
        e('span',{className:'brand'},'WATCON'),
        e('span',{className:'breadcrumb'},'/ Item Management')
      ),
      e('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        // role toggle for demo
        e('div',{style:{display:'flex',border:'1px solid rgba(10,10,10,0.15)',fontSize:9}},
          e('button',{style:{padding:'4px 12px',background:role==='employee'?'#0a0a0a':'transparent',color:role==='employee'?'#f8f7f4':'#888',border:'none',cursor:'pointer',fontSize:9,letterSpacing:'0.2em'},onClick:()=>setRole('employee')},'Employee'),
          e('button',{style:{padding:'4px 12px',background:role==='admin'?'#0a0a0a':'transparent',color:role==='admin'?'#f8f7f4':'#888',border:'none',cursor:'pointer',fontSize:9,letterSpacing:'0.2em'},onClick:()=>setRole('admin')},'Admin')
        ),
        e('span',{className:'role-pill'+(role==='admin'?' admin':'')},role),
        view==='list'&&e('button',{className:'btn btn-primary',onClick:()=>setView('new')},'+ New Item')
      )
    ),
    e('div',{className:'main'},
      view==='list'&&e('div',null,
        e('div',{className:'search-bar'},
          e('div',{className:'search-wrap'},
            e('i',{className:'ti ti-search search-icon'}),
            e('input',{className:'search-input',placeholder:'Search by name, ID, or variant…',value:search,onChange:ev=>setSearch(ev.target.value)})
          ),
          e('div',{className:'filter-tabs'},
            ...([['all','All'],['domestic','Domestic'],['imported','Imported'],['variants','Variants']]).map(([v,l])=>
              e('button',{className:'filter-tab'+(filter===v?' active':''),key:v,onClick:()=>setFilter(v)},l)
            )
          ),
          e('span',{style:{fontSize:10,color:'#aaa',letterSpacing:'0.1em',whiteSpace:'nowrap'}},filtered.length+' items')
        ),
        filtered.length===0
          ?e('div',{className:'no-items'},'No items found')
          :e('div',{className:'item-grid'},
              ...filtered.map(item=>e(ItemCard,{key:item.id,item,onClick:openItem}))
            )
      ),
      view==='detail'&&selected&&e(ItemDetail,{
        item:selected,allItems:items,role,
        onBack:()=>{setSelected(null);setView('list');},
        onUpdate:handleUpdate,
        onStockAdjust:handleStockAdjust
      }),
      view==='new'&&e(NewItemForm,{onSave:saveNew,onCancel:()=>setView('list')})
    )
  );
}

ReactDOM.createRoot(document.getElementById('items-root')).render(e(App));

}
</script>

         .map(i => i.variantLabel).filter(Boolean)
  )].sort();
  if(vars.length === 0){ sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  g.innerHTML = '';
  vars.forEach(v => {
    const b = document.createElement('button');
    b.className = 'chip' + (selVariations.has(v) ? ' active' : '');
    b.textContent = v;
    b.onclick = () => toggleFilter('variation', v, b);
    g.appendChild(b);
  });
}

function buildBrandChips(families, variations){
  const g = document.getElementById('brand-chips');
  const visible = filteredItems(families, variations, new Set(), '');
  const brands = [...new Set(visible.map(i => i.brand))].sort();
  g.innerHTML = '';
  brands.forEach(br => {
    const b = document.createElement('button');
    b.className = 'chip' + (selBrands.has(br) ? ' active' : '');
    b.textContent = br;
    b.onclick = () => toggleFilter('brand', br, b);
    g.appendChild(b);
  });
}

function toggleFilter(type, val, btn){
  if(type === 'family'){
    selFamilies.has(val) ? selFamilies.delete(val) : selFamilies.add(val);
    selVariations.clear(); // reset downstream
    selBrands.clear();
  } else if(type === 'variation'){
    selVariations.has(val) ? selVariations.delete(val) : selVariations.add(val);
    selBrands.clear();
  } else if(type === 'brand'){
    selBrands.has(val) ? selBrands.delete(val) : selBrands.add(val);
  }
  renderAll();
}

function clearFilter(type){
  if(type === 'family'){ selFamilies.clear(); selVariations.clear(); selBrands.clear(); }
  if(type === 'variation'){ selVariations.clear(); selBrands.clear(); }
  if(type === 'brand'){ selBrands.clear(); }
  renderAll();
}

function onSearch(){
  searchText = document.getElementById('search-box').value.toLowerCase().trim();
  selFamilies.clear(); selVariations.clear(); selBrands.clear();
  // auto-select matching families
  if(searchText){
    allFamilies.forEach(f => {
      if(f.toLowerCase().includes(searchText)) selFamilies.add(f);
    });
  }
  renderAll();
}

// ─── FILTER ───────────────────────────────────────────────────────
function filteredItems(families, variations, brands, search){
  return ITEMS.filter(i => {
    const mSearch = !search || i.family.toLowerCase().includes(search) || i.variantLabel.toLowerCase().includes(search) || i.brand.toLowerCase().includes(search) || i.id.toLowerCase().includes(search);
    const mFamily = families.size === 0 || families.has(i.family);
    const mVar    = variations.size === 0 || variations.has(i.variantLabel);
    const mBrand  = brands.size === 0 || brands.has(i.brand);
    return mSearch && mFamily && mVar && mBrand;
  });
}

function getFiltered(){
  return filteredItems(selFamilies, selVariations, selBrands, searchText);
}

// ─── RENDER ALL ───────────────────────────────────────────────────
function renderAll(){
  buildFamilyChips();
  buildVariationChips(selFamilies);
  buildBrandChips(selFamilies, selVariations);

  const items = getFiltered();
  const from = document.getElementById('dt-from').value;
  const to   = document.getElementById('dt-to').value;

  // heading
  let heading = 'Stock Report';
  let sub = [];
  if(selFamilies.size > 0) heading = [...selFamilies].join(', ');
  if(selVariations.size > 0) sub.push([...selVariations].join(', '));
  if(selBrands.size > 0) sub.push([...selBrands].join(', '));
  if(sub.length === 0 && selFamilies.size === 0) sub.push('All items · All brands');
  document.getElementById('report-heading').textContent = heading;
  document.getElementById('report-sub').textContent = sub.join(' · ');
  document.getElementById('sales-section-label').textContent = 'Sales Movement ('+from+' to '+to+')';

  // totals
  const totalStock = items.reduce((s,i) => s + i.stock, 0);
  const totalCost  = items.reduce((s,i) => s + i.stock * i.purchasePrice, 0);
  const allSales   = items.flatMap(i => i.history.filter(h => h.date >= from && h.date <= to));
  const totalSales = allSales.reduce((s,h) => s + h.value, 0);
  const totalSalesQty = allSales.reduce((s,h) => s + h.qty, 0);

  document.getElementById('t-items').textContent = items.length;
  document.getElementById('t-stock').textContent = items.length > 0 ? (totalStock > 0 ? fmt(totalStock)+' units' : '0') : '—';
  document.getElementById('t-cost').textContent  = items.length > 0 ? fmtC(totalCost) : '—';
  document.getElementById('t-sales').textContent = items.length > 0 ? fmtC(totalSales) : '—';
  document.getElementById('result-count').textContent = items.length;
  document.getElementById('result-stock-val').textContent = items.length > 0 ? fmtC(totalCost) : '—';

  // stock table
  const st = document.getElementById('stock-table');
  if(items.length === 0){
    st.innerHTML = '<div class="empty">No items match your filters</div>';
    document.getElementById('grand-total').style.display = 'none';
    document.getElementById('sales-table').innerHTML = '';
    document.getElementById('sales-total-row').style.display = 'none';
    return;
  }

  st.innerHTML = items.map(i => `
    <div class="item-row">
      <div>
        <div class="ir-name">${i.family}</div>
        <div class="ir-sub">${i.variantLabel} · ${i.id}</div>
        <div style="margin-top:4px;">${i.stock < 100 ? '<span class="badge-low">Low Stock</span>' : '<span class="badge-ok">In Stock</span>'} ${i.isImported ? '<span style="font-size:8px;letter-spacing:1px;padding:2px 6px;background:#0a0a0a;color:#fff;margin-left:4px;">Imported</span>' : ''}</div>
      </div>
      <div style="text-align:right;">
        <div class="ir-val">${fmt(i.stock)}</div>
        <div class="ir-label">${i.unit}</div>
      </div>
      <div style="text-align:right;">
        <div class="ir-val" style="font-size:13px;">${fmtC(i.purchasePrice)}</div>
        <div class="ir-label">per ${i.unit}</div>
      </div>
      <div style="text-align:right;">
        <div class="ir-val" style="font-size:13px;">${fmtC(i.sellingPrice)}</div>
        <div class="ir-label">per ${i.unit}</div>
      </div>
      <div style="text-align:right;">
        <div class="ir-val">${fmtC(i.stock * i.purchasePrice)}</div>
        <div class="ir-label">${i.brand}</div>
      </div>
    </div>`).join('');

  document.getElementById('gt-val').textContent = fmtC(totalCost);
  document.getElementById('grand-total').style.display = 'grid';

  // sales table
  const salesRows = items.flatMap(i =>
    i.history.filter(h => h.date >= from && h.date <= to).map(h => ({...h, item: i}))
  ).sort((a,b) => b.date.localeCompare(a.date));

  const stt = document.getElementById('sales-table');
  if(salesRows.length === 0){
    stt.innerHTML = '<div class="empty" style="padding:16px 0;">No sales transactions in this period</div>';
    document.getElementById('sales-total-row').style.display = 'none';
  } else {
    stt.innerHTML = salesRows.map(h => `
      <div class="sales-row">
        <div class="sales-cell muted">${h.date}</div>
        <div class="sales-cell">${h.item.family}<span style="font-size:10px;color:#aaa;"> · ${h.item.variantLabel}</span></div>
        <div class="sales-cell">${h.customer}</div>
        <div class="sales-cell r">${fmt(h.qty)} ${h.item.unit}</div>
        <div class="sales-cell r">${fmtC(h.value)}</div>
      </div>`).join('');
    const str = document.getElementById('sales-total-row');
    str.style.display = 'block';
    document.getElementById('sales-total-val').textContent = fmtC(totalSales);
  }
}

// ─── PDF GENERATION ───────────────────────────────────────────────
function generatePDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const items = getFiltered();
  const from  = document.getElementById('dt-from').value;
  const to    = document.getElementById('dt-to').value;
  const ts    = new Date().toLocaleString('en-IN');

  const totalCost  = items.reduce((s,i) => s + i.stock * i.purchasePrice, 0);
  const allSales   = items.flatMap(i => i.history.filter(h => h.date >= from && h.date <= to));
  const totalSales = allSales.reduce((s,h) => s + h.value, 0);

  let heading = items.length > 0 ? ([...selFamilies].length > 0 ? [...selFamilies].join(', ') : 'Complete Stock Report') : 'Stock Report';
  let sub = [];
  if(selVariations.size > 0) sub.push([...selVariations].join(', '));
  if(selBrands.size > 0) sub.push([...selBrands].join(', '));

  const W = doc.internal.pageSize.getWidth();
  const margin = 18;
  let y = margin;

  // Header
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(170,170,170);
  doc.text('WATCON MANAGEMENT SOFTWARE', margin, y);
  doc.text('Generated: ' + ts, W - margin, y, {align:'right'});
  y += 5;

  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.setTextColor(10,10,10);
  doc.text(heading, margin, y);
  y += 5;

  if(sub.length > 0){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(130,130,130);
    doc.text(sub.join(' · '), margin, y);
    y += 4;
  }

  doc.setFontSize(8);
  doc.setTextColor(150,150,150);
  doc.text('Period: ' + from + ' to ' + to, margin, y);
  y += 4;

  // Separator
  doc.setDrawColor(10,10,10);
  doc.setLineWidth(0.5);
  doc.line(margin, y, W - margin, y);
  y += 6;

  // Summary boxes (4 inline)
  const bw = (W - margin * 2 - 9) / 4;
  const summaries = [
    ['ITEMS', String(items.length)],
    ['STOCK VALUE', fmtC(totalCost)],
    ['PERIOD SALES', fmtC(totalSales)],
    ['PERIOD', from + ' — ' + to],
  ];
  summaries.forEach(([l, v], idx) => {
    const bx = margin + idx * (bw + 3);
    doc.setFillColor(248, 247, 244);
    doc.rect(bx, y, bw, 14, 'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(6);
    doc.setTextColor(170,170,170);
    doc.text(l, bx + 3, y + 4);
    doc.setFont('helvetica','bold');
    doc.setFontSize(idx < 3 ? 9 : 7);
    doc.setTextColor(10,10,10);
    doc.text(v, bx + 3, y + 10);
  });
  y += 20;

  // Stock table
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text('CURRENT STOCK POSITION', margin, y);
  y += 4;

  const stockCols = [
    {header:'Item / Variation', dataKey:'name'},
    {header:'Brand', dataKey:'brand'},
    {header:'Stock', dataKey:'stock'},
    {header:'Purchase ₹', dataKey:'purchase'},
    {header:'Selling ₹', dataKey:'selling'},
    {header:'Stock Value', dataKey:'value'},
    {header:'Status', dataKey:'status'},
  ];
  const stockRows = items.map(i => ({
    name: i.family + '\n' + i.variantLabel + '\n' + i.id,
    brand: i.brand,
    stock: fmt(i.stock) + ' ' + i.unit,
    purchase: fmtC(i.purchasePrice),
    selling: fmtC(i.sellingPrice),
    value: fmtC(i.stock * i.purchasePrice),
    status: i.stock < 100 ? 'LOW' : 'OK',
  }));

  doc.autoTable({
    startY: y,
    columns: stockCols,
    body: stockRows,
    margin: {left: margin, right: margin},
    styles: {fontSize: 8, cellPadding: 3, textColor: [60,60,60], font: 'helvetica'},
    headStyles: {fillColor: [10,10,10], textColor: [255,255,255], fontSize: 7, fontStyle: 'bold', cellPadding: 3},
    columnStyles: {
      0: {cellWidth: 55, fontStyle: 'bold'},
      2: {halign: 'right'},
      3: {halign: 'right'},
      4: {halign: 'right'},
      5: {halign: 'right', fontStyle: 'bold'},
      6: {halign: 'center'},
    },
    didDrawCell: (data) => {
      if(data.section === 'body' && data.column.dataKey === 'status'){
        const val = data.cell.raw;
        doc.setFillColor(val === 'LOW' ? 74 : 26, val === 'LOW' ? 26 : 74, val === 'LOW' ? 26 : 26);
        doc.setTextColor(255,255,255);
        doc.setFontSize(6);
        const cx = data.cell.x + data.cell.width/2;
        const cy = data.cell.y + data.cell.height/2 + 2;
        doc.roundedRect(data.cell.x+2, data.cell.y+2, data.cell.width-4, data.cell.height-4, 0, 0, 'F');
        doc.text(val, cx, cy, {align:'center'});
      }
    },
    foot: [[{content:'Total Stock Cost Value', colSpan:5, styles:{fontStyle:'bold', fillColor:[240,239,233]}}, {content: fmtC(totalCost), styles:{halign:'right', fontStyle:'bold', fillColor:[240,239,233]}}, {content:'', styles:{fillColor:[240,239,233]}}]],
    footStyles: {textColor:[10,10,10], fontSize: 9},
  });

  y = doc.lastAutoTable.finalY + 10;

  // Sales table
  const salesRows = items.flatMap(i =>
    i.history.filter(h => h.date >= from && h.date <= to).map(h => ({...h, item: i}))
  ).sort((a,b) => b.date.localeCompare(a.date));

  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text('SALES MOVEMENT (' + from + ' TO ' + to + ')', margin, y);
  y += 4;

  if(salesRows.length === 0){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(180,180,180);
    doc.text('No sales transactions in selected period', margin, y + 4);
  } else {
    doc.autoTable({
      startY: y,
      columns: [
        {header:'Date', dataKey:'date'},
        {header:'Item', dataKey:'item'},
        {header:'Customer', dataKey:'customer'},
        {header:'Qty', dataKey:'qty'},
        {header:'Value', dataKey:'value'},
      ],
      body: salesRows.map(h => ({
        date: h.date,
        item: h.item.family + ' · ' + h.item.variantLabel,
        customer: h.customer,
        qty: fmt(h.qty) + ' ' + h.item.unit,
        value: fmtC(h.value),
      })),
      margin: {left: margin, right: margin},
      styles: {fontSize: 8, cellPadding: 3, textColor: [60,60,60]},
      headStyles: {fillColor: [10,10,10], textColor: [255,255,255], fontSize: 7, fontStyle: 'bold'},
      columnStyles: {
        0: {cellWidth: 22, textColor: [150,150,150]},
        3: {halign: 'right'},
        4: {halign: 'right', fontStyle: 'bold'},
      },
      foot: [[{content:'Total Revenue', colSpan:4, styles:{fontStyle:'bold', fillColor:[240,239,233]}}, {content: fmtC(totalSales), styles:{halign:'right', fontStyle:'bold', fillColor:[240,239,233]}}]],
      footStyles: {textColor:[10,10,10], fontSize: 9},
    });
  }

  // Footer on each page
  const pageCount = doc.internal.getNumberOfPages();
  for(let p = 1; p <= pageCount; p++){
    doc.setPage(p);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(180,180,180);
    doc.text('Watcon Management Software · Confidential · ' + ts, margin, 290);
    doc.text('Page ' + p + ' of ' + pageCount, W - margin, 290, {align:'right'});
  }

  const fileName = 'Watcon_Stock_Report_' + from + '_to_' + to + '.pdf';
  return {doc, fileName};
}

// ─── ACTIONS ─────────────────────────────────────────────────────
function doAction(type){
  const fb = document.getElementById('feedback');
  fb.style.display = 'none';

  const items = getFiltered();
  const from  = document.getElementById('dt-from').value;
  const to    = document.getElementById('dt-to').value;

  if(type === 'pdf'){
    const {doc, fileName} = generatePDF();
    doc.save(fileName);

  } else if(type === 'print'){
    const {doc} = generatePDF();
    doc.autoPrint();
    const blob = doc.output('bloburl');
    window.open(blob, '_blank');

  } else if(type === 'email'){
    // Generate PDF as base64 data URI, open in new window with mailto fallback
    try{
      const {doc, fileName} = generatePDF();
      // Open PDF in new window so user can manually attach or save+attach
      const pdfBlob = doc.output('blob');
      const url = URL.createObjectURL(pdfBlob);
      const w = window.open('', '_blank');
      w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Email PDF</title>
      <style>body{font-family:Arial,sans-serif;padding:30px;background:#f8f7f4;color:#0a0a0a;}
      .box{background:#fff;border:1px solid #ddd;padding:24px;max-width:500px;margin:0 auto;}
      h2{font-weight:300;margin-bottom:12px;}p{font-size:13px;color:#555;line-height:1.7;margin-bottom:12px;}
      .btn{display:inline-block;padding:10px 20px;background:#0a0a0a;color:#fff;text-decoration:none;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;margin-right:8px;}
      .btn2{background:transparent;color:#0a0a0a;border:1px solid #0a0a0a;}
      </style></head><body><div class="box">
      <h2>Email Stock Report PDF</h2>
      <p>Your PDF report <strong>${fileName}</strong> is ready.</p>
      <p>Steps:<br/>
      1. Click <strong>Download PDF</strong> below to save the file.<br/>
      2. Click <strong>Open Email</strong> to compose a new email.<br/>
      3. Attach the downloaded PDF to your email.</p>
      <a class="btn" href="${url}" download="${fileName}">Download PDF</a>
      <a class="btn btn2" href="mailto:?subject=${encodeURIComponent('Watcon Stock Report — '+from+' to '+to)}&body=${encodeURIComponent('Please find the Watcon stock report attached.\n\nPeriod: '+from+' to '+to+'\n\nWatcon Management Software')}">Open Email</a>
      </div></body></html>`);
      w.document.close();
    } catch(e){
      // mailto fallback with plain text
      const text = buildPlainText();
      window.open('mailto:?subject='+encodeURIComponent('Watcon Stock Report')+'&body='+encodeURIComponent(text),'_blank');
    }

  } else if(type === 'whatsapp'){
    // Step 1: auto-download the PDF
    const {doc, fileName} = generatePDF();
    doc.save(fileName);
    // Step 2: after a short delay, open WhatsApp with an instruction message
    const items2 = getFiltered();
    const from2  = document.getElementById('dt-from').value;
    const to2    = document.getElementById('dt-to').value;
    const totalCost2 = items2.reduce((s,i) => s + i.stock * i.purchasePrice, 0);
    const allSales2  = items2.flatMap(i => i.history.filter(h => h.date >= from2 && h.date <= to2));
    const totalSales2 = allSales2.reduce((s,h) => s + h.value, 0);
    const waMsg =
      'WATCON MANAGEMENT SOFTWARE\n' +
      'Stock Report — ' + from2 + ' to ' + to2 + '\n' +
      '─────────────────────────\n' +
      'Items: ' + items2.length + '\n' +
      'Stock Value: ' + fmtC(totalCost2) + '\n' +
      'Period Sales: ' + fmtC(totalSales2) + '\n' +
      '─────────────────────────\n' +
      'PDF report: ' + fileName + '\n' +
      '(PDF has been downloaded to your device — tap the attachment icon in WhatsApp to attach it)';
    fb.style.display = 'block';
    fb.style.color = '#1a7a3a';
    fb.innerHTML = '<i class="ti ti-download" style="vertical-align:-2px;margin-right:4px;"></i>PDF downloading... WhatsApp opening in 2 seconds. Tap the <strong>attachment icon</strong> in WhatsApp to attach the PDF.';
    setTimeout(() => {
      window.open('https://wa.me/?text=' + encodeURIComponent(waMsg), '_blank');
      setTimeout(() => { fb.style.display = 'none'; }, 5000);
    }, 1800);

  } else if(type === 'copy'){
    navigator.clipboard.writeText(buildPlainText()).then(() => {
      fb.style.display='block'; fb.style.color='#3a6a3a'; fb.textContent='Report text copied to clipboard ✓';
      setTimeout(() => fb.style.display='none', 2500);
    }).catch(() => {
      fb.style.display='block'; fb.style.color='#8a3030'; fb.textContent='Could not access clipboard — please copy the preview manually';
      setTimeout(() => fb.style.display='none', 3000);
    });
  }
}

function buildPlainText(){
  const items = getFiltered();
  const from  = document.getElementById('dt-from').value;
  const to    = document.getElementById('dt-to').value;
  const ts    = new Date().toLocaleString('en-IN');
  let txt = 'WATCON MANAGEMENT SOFTWARE\nSTOCK REPORT\nGenerated: ' + ts + '\nPeriod: ' + from + ' to ' + to + '\n' + '='.repeat(60) + '\n\n';
  txt += 'CURRENT STOCK\n' + '-'.repeat(60) + '\n';
  items.forEach(i => {
    txt += i.family + ' · ' + i.variantLabel + ' (' + i.id + ')\n';
    txt += '  Brand: ' + i.brand + ' | Stock: ' + fmt(i.stock) + ' ' + i.unit + ' | Purchase: ' + fmtC(i.purchasePrice) + ' | Sell: ' + fmtC(i.sellingPrice) + '\n';
    txt += '  Stock Value: ' + fmtC(i.stock * i.purchasePrice) + (i.stock < 100 ? '  [LOW STOCK]' : '') + '\n\n';
  });
  txt += 'Total Stock Value: ' + fmtC(items.reduce((s,i) => s + i.stock * i.purchasePrice, 0)) + '\n\n';
  const allSales = items.flatMap(i => i.history.filter(h => h.date >= from && h.date <= to).map(h => ({...h, item:i}))).sort((a,b) => b.date.localeCompare(a.date));
  if(allSales.length > 0){
    txt += 'SALES MOVEMENT (' + from + ' to ' + to + ')\n' + '-'.repeat(60) + '\n';
    allSales.forEach(h => txt += h.date + ' | ' + h.item.family + ' · ' + h.item.variantLabel + ' | ' + h.customer + ' | ' + fmt(h.qty) + ' ' + h.item.unit + ' | ' + fmtC(h.value) + '\n');
    txt += '\nTotal Sales: ' + fmtC(allSales.reduce((s,h) => s + h.value, 0)) + '\n';
  }
  txt += '\nWatcon Management Software · Confidential';
  return txt;
}

// ─── INIT ─────────────────────────────────────────────────────────
renderAll();

  window.onSearch=onSearch; window.clearFilter=clearFilter;
  window.renderAll=renderAll; window.doAction=doAction;
  window.toggleFilter=toggleFilter;
  _cleanupFn=function(){
    ['onSearch','clearFilter','renderAll','doAction','toggleFilter'].forEach(k=>delete window[k]);
  };
  // sync with shared catalogue
  ITEMS.forEach(si=>{
    const shared=CATALOGUE.find(c=>c.id===si.id);
    if(shared) si.stock=shared.stock;
  });
  renderAll();
}
