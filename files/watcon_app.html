<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Watcon — Management Software</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
/* ── Reset & tokens ──────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f4; --bg2:#fff; --bg3:#f0efe9;
  --ink:#0a0a0a; --ink2:#555; --ink3:#aaa;
  --border:rgba(10,10,10,.1); --border2:rgba(10,10,10,.06);
  --gold:#d4c060; --gold-bg:#fffdf5; --gold-ink:#7a6010;
  --blue:#185fa5; --green:#1a5a1a; --red:#7a2020;
  --nav-w:220px; --topbar-h:52px;
}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:#ccc;}
/* ── Shell ───────────────────────────────────────────────────────── */
.shell{display:flex;min-height:100vh;}
/* ── Nav ─────────────────────────────────────────────────────────── */
.nav{width:var(--nav-w);flex-shrink:0;background:var(--ink);color:#f8f7f4;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
.nav-brand{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.nav-brand-name{font-family:'Noto Serif JP',serif;font-weight:300;font-size:18px;letter-spacing:.2em;}
.nav-brand-sub{font-size:8px;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:4px;}
.nav-items{flex:1;padding:12px 0;}
.nav-section{font-size:7px;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:14px 20px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;cursor:pointer;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);transition:all .15s;border-left:2px solid transparent;user-select:none;}
.nav-item:hover{color:#f8f7f4;background:rgba(255,255,255,.04);}
.nav-item.active{color:#f8f7f4;background:rgba(255,255,255,.07);border-left-color:#f8f7f4;}
.nav-item i{font-size:17px;flex-shrink:0;}
.nav-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.2em;}
/* ── Main ────────────────────────────────────────────────────────── */
.main-wrap{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Noto Serif JP',serif;font-weight:300;font-size:16px;letter-spacing:.15em;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
#module-body{flex:1;padding:20px 22px;}
/* ── Shared components ───────────────────────────────────────────── */
.panel{background:var(--bg2);border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.pt{font-size:8px;letter-spacing:.45em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.lbl,.label{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:5px;}
.fi,.field-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(10,10,10,.2);padding:7px 0;font-size:12px;color:var(--ink);outline:none;}
.fi:focus,.field-input:focus{border-bottom-color:var(--ink);}
.fi:disabled{color:var(--ink3);border-bottom-color:rgba(10,10,10,.08);}
.fsel,.field-select{width:100%;background:var(--bg2);border:1px solid rgba(10,10,10,.16);padding:7px 8px;font-size:12px;color:var(--ink);outline:none;}
.fta,.field-textarea{width:100%;background:transparent;border:1px solid rgba(10,10,10,.18);padding:8px;font-size:12px;color:var(--ink);outline:none;resize:vertical;min-height:56px;line-height:1.5;}
.fi-inline{background:transparent;border:none;border-bottom:1px solid rgba(10,10,10,.12);padding:4px 0;font-size:12px;color:var(--ink);outline:none;width:100%;}
.fi-inline:focus{border-bottom-color:var(--ink);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.fr,.frow{margin-bottom:12px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
/* buttons */
.bp,.btn-primary{background:var(--ink);color:#f8f7f4;border:none;padding:8px 18px;font-size:10px;letter-spacing:.4em;text-transform:uppercase;cursor:pointer;font-family:inherit;}
.bp:hover,.btn-primary:hover{opacity:.8;}
.bg,.btn-ghost{background:transparent;color:var(--ink2);border:1px solid rgba(10,10,10,.2);padding:7px 14px;font-size:10px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;font-family:inherit;}
.bg:hover,.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.bs,.btn-sm{padding:5px 12px;font-size:9px;letter-spacing:.25em;}
.bi,.btn-icon{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;padding:3px;}
.bi:hover,.btn-icon:hover{color:var(--ink);}
.ba{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px dashed rgba(10,10,10,.25);background:transparent;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink2);cursor:pointer;width:100%;}
.ba:hover{border-color:var(--ink);color:var(--ink);}
/* search */
.search-wrap{position:relative;flex:1;}
.search-input{width:100%;border:1px solid rgba(10,10,10,.14);padding:9px 12px 9px 34px;font-size:12px;outline:none;color:var(--ink);background:var(--bg2);}
.search-input:focus{border-color:var(--ink);}
.si,.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--ink3);}
/* status badges */
.qs,.status-badge{display:inline-block;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:2px 8px;}
.qs-draft{background:#888;color:#fff;}.qs-sent{background:#185fa5;color:#fff;}.qs-accepted{background:#1a5a1a;color:#fff;}.qs-revised{background:#ba7517;color:#fff;}.qs-cancelled{background:#7a2020;color:#fff;}
/* filter tabs */
.ftabs,.filter-tabs{display:flex;border:1px solid rgba(10,10,10,.14);flex-shrink:0;flex-wrap:wrap;}
.ftab,.filter-tab{padding:7px 10px;font-size:10px;letter-spacing:.15em;background:var(--bg2);color:var(--ink3);border:none;cursor:pointer;font-family:inherit;}
.ftab.active,.filter-tab.active{background:var(--ink);color:#f8f7f4;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--bg2);border:1px solid rgba(10,10,10,.15);padding:22px;width:480px;max-width:96vw;max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:300;margin-bottom:14px;}
.empty{text-align:center;padding:40px 0;font-size:10px;color:#ccc;letter-spacing:.3em;}
/* ── Dashboard ───────────────────────────────────────────────────── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
.dash-card{background:var(--bg2);border:1px solid var(--border);padding:18px;cursor:pointer;transition:border-color .15s;}
.dash-card:hover{border-color:var(--ink);}
.dash-card-icon{font-size:24px;color:var(--ink3);margin-bottom:10px;}
.dash-card-label{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.dash-card-val{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:300;}
.dash-recent{background:var(--bg2);border:1px solid var(--border);padding:16px;}
.dash-recent-title{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
.dash-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.dash-row:last-child{border-bottom:none;}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:12px;}
.qc{background:#fff;border:1px solid rgba(10,10,10,.1);padding:15px;cursor:pointer;transition:border-color .15s;}
.qc:hover{border-color:#0a0a0a;}
.qs{display:inline-block;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:2px 8px;}
.qs-draft{background:#888;color:#fff;}.qs-sent{background:#185fa5;color:#fff;}.qs-accepted{background:#1a5a1a;color:#fff;}.qs-revised{background:#ba7517;color:#fff;}.qs-cancelled{background:#7a2020;color:#fff;}
.ftabs{display:flex;border:1px solid rgba(10,10,10,.14);flex-shrink:0;flex-wrap:wrap;}
.ftab{padding:7px 10px;font-size:10px;letter-spacing:.15em;background:#fff;color:#888;border:none;cursor:pointer;font-family:inherit;}
.ftab.active{background:#0a0a0a;color:#f8f7f4;}
.qb-hdr{display:grid;grid-template-columns:1fr 265px;gap:14px;margin-bottom:12px;}
.logo-box{height:62px;border:1px dashed rgba(10,10,10,.2);background:#f8f7f4;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin-bottom:10px;}
.logo-box img{max-width:100%;max-height:100%;object-fit:contain;}
/* location */
.loc-block{border:1px solid rgba(10,10,10,.1);margin-bottom:14px;background:#fff;}
.loc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid rgba(10,10,10,.07);background:#f8f7f4;}
.loc-num{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:#aaa;margin-right:8px;flex-shrink:0;}
.loc-body{padding:13px;}
/* items table */
.li-table{width:100%;border-collapse:collapse;font-size:11px;}
.li-table th{padding:6px 4px;font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:#aaa;font-weight:400;border-bottom:1px solid rgba(10,10,10,.1);text-align:left;white-space:nowrap;}
.li-table th.r,.li-table td.r{text-align:right;}
.li-table td{padding:6px 4px;border-bottom:1px solid rgba(10,10,10,.05);vertical-align:middle;}
.li-img{width:38px;height:38px;background:#f3f2ef;border:1px solid rgba(10,10,10,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;flex-shrink:0;}
.li-img img{width:100%;height:100%;object-fit:cover;}
.li-disc-lbl{color:#1a5a1a;font-size:10px;}
.opt-row td{background:#fffdf5;border-bottom:1px solid rgba(185,175,120,.3);}
.opt-row:last-of-type td{border-bottom:2px solid rgba(185,175,120,.5);}
.opt-tag{display:inline-block;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:2px 7px;background:#f8f4e0;border:1px solid #d4c060;color:#7a6010;margin-right:6px;vertical-align:middle;}
.opt-make-primary{font-size:9px;letter-spacing:.2em;text-transform:uppercase;background:#0a0a0a;color:#f8f7f4;border:none;padding:3px 10px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.opt-make-primary:hover{opacity:.8;}
.opt-indent{width:14px;flex-shrink:0;}
/* installation block */
.inst-block{margin-top:10px;border:1px solid rgba(185,175,120,.5);background:#fffdf5;}
.inst-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f8f4e0;border-bottom:1px solid rgba(185,175,120,.4);}
.inst-body{padding:12px;}
.inst-mode-wrap{display:flex;border:1px solid rgba(10,10,10,.18);margin-bottom:10px;}
.imb{flex:1;padding:6px 4px;font-size:9px;letter-spacing:.1em;text-align:center;border:none;background:transparent;color:#888;cursor:pointer;font-family:inherit;line-height:1.4;}
.imb.active{background:#0a0a0a;color:#f8f7f4;}
.inst-total-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid rgba(185,175,120,.4);background:#f8f4e0;}
/* loc total row */
.loc-total-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-top:2px solid #0a0a0a;background:#0a0a0a;color:#f8f7f4;}
.lt-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;}
.lt-val{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:300;}
/* summary */
.sum-grid{display:grid;grid-template-columns:1fr 300px;gap:14px;margin-top:12px;}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid rgba(10,10,10,.06);font-size:12px;}
.sum-row:last-child{border-bottom:none;}
.sum-label{color:#555;}
.sum-val{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:300;}
.sum-row.gst .sum-val{color:#185fa5;}
.sum-row.inst .sum-val{color:#7a6010;}
.sum-row.grand{border-top:2px solid #0a0a0a;padding-top:10px;margin-top:4px;}
.sum-row.grand .sum-label{font-weight:500;font-size:13px;}
.sum-row.grand .sum-val{font-size:20px;}
/* total display mode */
.tm-wrap{display:flex;border:1px solid rgba(10,10,10,.15);margin-top:12px;}
.tm-btn{flex:1;padding:11px 8px;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;transition:background .15s;}
.tm-btn:hover{background:#f0efe9;}
.tm-btn.active{background:#0a0a0a;color:#f8f7f4;}
.tm-btn i{font-size:18px;}
.tm-btn .tm-lbl{font-size:9px;letter-spacing:.25em;text-transform:uppercase;text-align:center;line-height:1.4;}
.tm-btn .tm-desc{font-size:9px;color:#aaa;text-align:center;line-height:1.4;}
.tm-btn.active .tm-desc{color:rgba(248,247,244,.6);}
/* gst mode */
.gst-mode-wrap{display:flex;border:1px solid rgba(10,10,10,.2);margin-bottom:10px;}
.gmb{flex:1;padding:7px 5px;font-size:9px;letter-spacing:.1em;text-align:center;border:none;background:transparent;color:#888;cursor:pointer;font-family:inherit;line-height:1.4;}
.gmb.active{background:#0a0a0a;color:#f8f7f4;}
/* terms */
.term-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px;}
.tcb{font-size:9px;letter-spacing:.2em;text-transform:uppercase;background:#f8f7f4;border:1px solid rgba(10,10,10,.12);padding:4px 8px;color:#555;white-space:nowrap;cursor:default;flex-shrink:0;}
.tab-b{font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:#f8f7f4;border:1px solid rgba(10,10,10,.12);padding:4px 10px;color:#555;cursor:pointer;font-family:inherit;}
.tab-b:hover{border-color:#0a0a0a;color:#0a0a0a;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#fff;border:1px solid rgba(10,10,10,.15);padding:22px;width:480px;max-width:96vw;max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:300;margin-bottom:14px;}
.ip-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:260px;overflow-y:auto;margin-bottom:12px;}
.ip-card{border:1px solid rgba(10,10,10,.1);padding:9px;cursor:pointer;display:flex;gap:7px;align-items:center;transition:border-color .15s;}
.ip-card:hover{border-color:#0a0a0a;}.ip-card.sel{border-color:#0a0a0a;background:#f8f7f4;}
.ip-thumb{width:34px;height:34px;background:#f3f2ef;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ip-nm{font-size:11px;font-weight:500;line-height:1.3;}.ip-sb{font-size:9px;color:#aaa;}
/* preview */
.pv-wrap{background:#fff;border:1px solid rgba(10,10,10,.1);padding:28px;font-size:12px;margin-bottom:14px;}
.pv-brand{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:300;letter-spacing:.15em;}
.pv-loc-hd{background:#0a0a0a;color:#f8f7f4;padding:6px 10px;font-size:9px;letter-spacing:.4em;text-transform:uppercase;margin:14px 0 7px;}
.pv-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px;}
.pv-table th{padding:6px 4px;font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:#aaa;font-weight:400;border-bottom:1px solid rgba(10,10,10,.12);text-align:left;}
.pv-table th.r,.pv-table td.r{text-align:right;}
.pv-table td{padding:8px 4px;border-bottom:1px solid rgba(10,10,10,.05);}
.pv-sub-row td{background:#f8f7f4;font-weight:500;border-top:1px solid rgba(10,10,10,.12);}
.pv-inst-row td{background:#fffdf5;color:#7a6010;border-top:1px dashed rgba(185,175,120,.5);}
.pv-loc-total td{background:#0a0a0a;color:#f8f7f4;font-weight:500;border-top:none;}
.pv-terms{margin-top:18px;border-top:1px solid rgba(10,10,10,.1);padding-top:12px;}
.pv-tc{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:#aaa;margin-bottom:3px;margin-top:10px;}
.empty{text-align:center;padding:40px 0;font-size:10px;color:#ccc;letter-spacing:.3em;}

.cust-card{background:#fff;border:1px solid rgba(10,10,10,0.1);padding:16px;cursor:pointer;transition:border-color 0.15s;position:relative;}
.cust-card:hover{border-color:#0a0a0a;}
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.cust-avatar{width:38px;height:38px;border-radius:50%;background:#0a0a0a;color:#f8f7f4;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;flex-shrink:0;}
.cust-name{font-size:13px;font-weight:500;margin-bottom:2px;line-height:1.3;}
.cust-id{font-size:8px;letter-spacing:0.3em;color:#bbb;text-transform:uppercase;}
.cust-meta{font-size:11px;color:#888;margin-top:6px;line-height:1.6;}
.cust-tag{display:inline-block;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;padding:2px 8px;border:1px solid rgba(10,10,10,0.15);color:#666;margin-top:6px;margin-right:4px;}
.cust-tag.active-tag{background:#0a0a0a;color:#f8f7f4;border-color:#0a0a0a;}

/* summary strip on card */
.cust-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(10,10,10,0.07);margin-top:10px;padding-top:10px;}
.cs-item{text-align:center;padding:4px 0;}
.cs-item+.cs-item{border-left:1px solid rgba(10,10,10,0.07);}
.cs-val{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;color:#0a0a0a;}
.cs-lbl{font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:#aaa;margin-top:2px;}
.cs-val.outstanding{color:#8a3030;}
.cs-val.paid{color:#1a5a1a;}

/* detail view */
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
.detail-avatar{width:52px;height:52px;border-radius:50%;background:#0a0a0a;color:#f8f7f4;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:18px;font-weight:300;flex-shrink:0;}
.detail-name{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:300;margin-bottom:3px;}
.detail-sub{font-size:10px;color:#aaa;letter-spacing:0.15em;}

/* metric cards */
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metric{background:#f8f7f4;padding:13px 15px;border:1px solid rgba(10,10,10,0.07);}
.metric.accent{border-left:3px solid #0a0a0a;}
.metric.danger{border-left:3px solid #8a3030;}
.metric.success{border-left:3px solid #1a5a1a;}
.m-lbl{font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.m-val{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:300;line-height:1;}
.m-sub{font-size:10px;color:#aaa;margin-top:4px;}
.m-val.danger{color:#8a3030;}
.m-val.success{color:#1a5a1a;}

/* quick action buttons */
.qa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.qa-btn{background:#fff;border:1px solid rgba(10,10,10,0.12);padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color 0.15s;font-family:inherit;}
.qa-btn:hover{border-color:#0a0a0a;}
.qa-btn i{font-size:20px;color:#555;}

// ── Quote math helpers (used by dashboard too) ────────────────────
function _lt(it){return it.rate*it.qty*(1-(it.disc||0)/100);}
function _itemsSub(loc){return loc.items.reduce((s,it)=>s+_lt(it),0);}
function _instAmt(loc){
  const inst=loc.installation;if(!inst||!inst.enabled)return 0;
  const base=_itemsSub(loc);
  if(inst.mode==='lumpsum')return parseFloat(inst.lumpsum)||0;
  if(inst.mode==='percent')return base*(parseFloat(inst.percent)||0)/100;
  if(inst.mode==='perunit'){const tq=loc.items.reduce((s,it)=>s+(parseFloat(it.qty)||0),0);return tq*(parseFloat(inst.perunit)||0);}
  return 0;
}
function _selLocs(q){return q.locations.filter(l=>l.selected!==false);}
function _qSub(q){return _selLocs(q).reduce((s,l)=>s+_itemsSub(l)+_instAmt(l),0);}
function _qGST(q){return(q.gstMode==='no'||q.gstMode==='incl')?0:_qSub(q)*(q.gstPct||0)/100;}
function _qGrand(q){return _qSub(q)+_qGST(q)+(parseFloat(q.transport)||0);}

<script>

// ── Calculation helpers ───────────────────────────────────────────────────────
const lt   = it  => it.rate * it.qty * (1 - (it.disc||0)/100);
const itemsSub = loc => loc.items.reduce((s,it)=>s+lt(it),0);

function instAmt(loc){
  const inst=loc.installation;
  if(!inst||!inst.enabled) return 0;
  const base=itemsSub(loc);
  if(inst.mode==='lumpsum')  return parseFloat(inst.lumpsum)||0;
  if(inst.mode==='percent')  return base*(parseFloat(inst.percent)||0)/100;
  if(inst.mode==='perunit'){
    const totalQty=loc.items.reduce((s,it)=>s+(parseFloat(it.qty)||0),0);
    return totalQty*(parseFloat(inst.perunit)||0);
  }
  return 0;
}

const locTotal  = loc  => itemsSub(loc) + instAmt(loc);
const selLocs   = q    => q.locations.filter(l=>l.selected!==false);
const qItemsSub = q    => selLocs(q).reduce((s,l)=>s+itemsSub(l),0);
const qInstTotal= q    => selLocs(q).reduce((s,l)=>s+instAmt(l),0);
const qSub      = q    => qItemsSub(q) + qInstTotal(q);
const qGST      = q    => (q.gstMode==='no'||q.gstMode==='incl')?0:qSub(q)*(q.gstPct||0)/100;
const qGrand    = q    => qSub(q)+qGST(q)+(parseFloat(q.transport)||0);

  <div class="panel">

      <select class="fsel" style="width:120px;" onchange="eq.status=this.value">

      </select>
    </div>
    <div class="qb-hdr">
      <div>
        <div class="g3" style="margin-bottom:12px;">
          <div class="fr"><label class="lbl">Quote Ref</label><input class="fi" value="${q.id}" disabled/></div>
          <div class="fr"><label class="lbl">Revision</label><input class="fi" value="${q.rev}" disabled/></div>
          <div class="fr"><label class="lbl">Date</label><input class="fi" type="date" value="${q.date}" onchange="eq.date=this.value"/></div>

        <div class="fr"><label class="lbl">Subject / Project Name</label>
          <input class="fi" value="${escH(q.subject)}" placeholder="e.g. Supply of Flooring — Bungalow Project" oninput="eq.subject=this.value"/>
        </div>
        <div class="pt" style="margin-bottom:10px;"><span>Customer</span>
          <button class="bg bs" onclick="showNC()">+ New Customer</button>
        </div>
        <div class="g3">
          <div class="fr"><label class="lbl">Select Customer</label>
            <select class="fsel" onchange="eq.custId=this.value;render()">
              <option value="">— Select —</option>
              ${custs.map(c=>`<option value="${c.id}" ${q.custId===c.id?'selected':''}>${escH(c.name)}</option>`).join('')}
            </select>
          </div>
          ${(()=>{const c=custs.find(x=>x.id===q.custId);if(!c)return'<div></div><div></div>';
          return `<div class="fr"><label class="lbl">Contact</label><div style="font-size:12px;padding-top:6px;">${escH(c.contact)} · ${c.phone}</div></div>
            <div class="fr"><label class="lbl">Address</label><div style="font-size:11px;color:#888;padding-top:5px;line-height:1.5;">${escH(c.billingAddress)}</div></div>`;})()}
        </div>
      </div>
      <div>
        <div class="logo-box" id="lbx" onclick="document.getElementById('lup').click()">
          ${q.companyLogo?`<img src="${q.companyLogo}"/>`:'<div style="text-align:center;font-size:9px;color:#ccc;letter-spacing:.2em;text-transform:uppercase;"><i class="ti ti-building" style="font-size:20px;display:block;margin-bottom:4px;"></i>Company Logo</div>'}
        </div>
        <input type="file" id="lup" accept="image/*" style="display:none;" onchange="upLogo(this)"/>
        <div class="fr"><label class="lbl">GST Mode</label>
          <div class="gst-mode-wrap">
            <button class="gmb ${q.gstMode==='yes'?'active':''}" onclick="eq.gstMode='yes';rerS()">Add GST</button>
            <button class="gmb ${q.gstMode==='incl'?'active':''}" onclick="eq.gstMode='incl';rerS()">Incl. in Price</button>
            <button class="gmb ${q.gstMode==='no'?'active':''}" onclick="eq.gstMode='no';rerS()">No GST</button>

            <input class="fi" type="number" value="${q.gstPct}" min="0" max="28" oninput="eq.gstPct=parseFloat(this.value)||0;rerS()"/></div>`:
            `<div style="background:#f8f4e0;border:1px solid #d4c060;padding:7px 9px;font-size:10px;color:#7a6010;">GST note in Terms &amp; Conditions</div>`}
        </div>
        <div class="fr"><label class="lbl">Transport (₹)</label>
          <input class="fi" type="number" value="${q.transport||0}" oninput="eq.transport=parseFloat(this.value)||0;rerS()"/>
        </div>
        <div class="fr"><label class="lbl">Transport Note</label>
          <input class="fi" value="${escH(q.transportNote)}" placeholder="Ex-Mumbai, included…" oninput="eq.transportNote=this.value"/>

  ${q.locations.map((loc,li)=>rLocBlock(loc,li)).join('')}

  </button>

  <div id="ss">${sumH(q)}</div>

  <div class="panel">
    <div class="pt"><span>Terms &amp; Conditions</span></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">

    </div>`).join('')}</div>

}

function rLocBlock(loc,li){
  const iSub=itemsSub(loc);
  const iAmt=instAmt(loc);
  const lTot=iSub+iAmt;
  const inst=loc.installation||defInst();

  const rows=loc.items.map(it=>{
    const ltv=lt(it),dA=it.rate*it.qty*(it.disc||0)/100;
    const opts=it.options||[];
    // Optional item rows (rendered after the main row)
    const optRows=opts.map(opt=>{
      const optTotal=opt.rate*(it.qty||0);
      return `<tr class="opt-row" id="opt-row-${opt.id}">
        <td>
          <div id="opt-img-${opt.id}" class="li-img" onclick="pickOptImg(${it.id},${opt.id})" title="Add image" style="opacity:.8;">
            ${opt.image?`<img src="${opt.image}" style="width:100%;height:100%;object-fit:cover;"/>`:
              `<i class="ti ti-photo" style="font-size:13px;color:#d4c060;"></i>`}
          </div>
        </td>
        <td>
          <span class="opt-tag">Alt</span>
          <input class="fi-inline" style="font-size:11px;" value="${escH(opt.name)}" oninput="upOpt(${it.id},${opt.id},'name',this.value)" placeholder="Alternative item name"/>
        </td>
        <td><input class="fi-inline" style="font-size:11px;" value="${escH(opt.brand||'')}" oninput="upOpt(${it.id},${opt.id},'brand',this.value)"/></td>
        <td><input class="fi-inline" style="font-size:11px;width:46px;" value="${opt.unit||it.unit}" oninput="upOpt(${it.id},${opt.id},'unit',this.value)"/></td>
        <td>
          <input class="fi-inline" type="number" style="text-align:right;font-size:11px;" value="${opt.rate}" oninput="upOpt(${it.id},${opt.id},'rate',parseFloat(this.value)||0);document.getElementById('opt-total-${opt.id}').textContent=fmtD((parseFloat(this.value)||0)*(${it.qty}||0));"/>
        </td>
        <td style="text-align:right;font-size:11px;color:#aaa;">${fmt(it.qty)} <span style="font-size:9px;">(same)</span></td>
        <td style="text-align:right;font-size:10px;color:#aaa;">—</td>
        <td class="r">
          <span id="opt-total-${opt.id}" style="font-family:'Noto Serif JP',serif;font-size:12px;color:#7a6010;">${fmtD(optTotal)}</span>
          <div style="font-size:8px;color:#bbb;letter-spacing:.1em;">not in total</div>
        </td>
        <td style="vertical-align:middle;">
          <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;">
            <button class="opt-make-primary" onclick="makePrimary(${it.id},${opt.id})" title="Swap this with the main item">
              <i class="ti ti-arrow-up" style="font-size:10px;vertical-align:-1px;margin-right:2px;"></i>Use
            </button>
            <button class="bi" onclick="removeOption(${it.id},${opt.id})"><i class="ti ti-x"></i></button>
          </div>
        </td>
      </tr>`;}).join('');

    return `<tr id="row-${it.id}">
      <td><div class="li-img" onclick="pickImg(${it.id})" title="Add image">
        ${it.image?`<img src="${it.image}"/>`:`<i class="ti ti-photo" style="font-size:14px;color:#ccc;"></i>`}
      </div></td>
      <td><input class="fi-inline" style="font-weight:500;" value="${escH(it.name)}" oninput="upIt(${it.id},'name',this.value)"/></td>
      <td><input class="fi-inline" value="${escH(it.brand||'')}" oninput="upIt(${it.id},'brand',this.value)"/></td>
      <td><input class="fi-inline" value="${it.unit}" style="width:46px;" oninput="upIt(${it.id},'unit',this.value)"/></td>
      <td><input class="fi-inline" type="number" value="${it.rate}" style="text-align:right;" oninput="upIt(${it.id},'rate',parseFloat(this.value)||0)"/></td>
      <td><input class="fi-inline" type="number" value="${it.qty}" style="text-align:right;" oninput="upIt(${it.id},'qty',parseFloat(this.value)||0)"/></td>
      <td><input class="fi-inline" type="number" value="${it.disc||0}" min="0" max="100" style="text-align:right;" oninput="upIt(${it.id},'disc',parseFloat(this.value)||0)"/>
        <div id="dl-${it.id}" class="${dA>0?'li-disc-lbl':''}" style="text-align:right;">${dA>0?'− '+fmtD(dA):''}</div></td>
      <td class="r">
        <span id="lt-${it.id}" style="font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;white-space:nowrap;">${fmtD(ltv)}</span>
      </td>
      <td>
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;">
          <button class="bi" onclick="rmIt(${it.id})" title="Remove item"><i class="ti ti-x"></i></button>
          <button class="bi" onclick="addOption(${it.id})" title="Add alternative option" style="color:#ba7517;font-size:13px;">
            <i class="ti ti-git-branch"></i>
          </button>
        </div>
      </td>
    </tr>${optRows}`;}).join('');

  // Installation block content
  const instContent=inst.enabled?`
    <div class="inst-body">
      <div class="fr"><label class="lbl">Mode</label>
        <div class="inst-mode-wrap">
          <button class="imb ${inst.mode==='lumpsum'?'active':''}" onclick="upInst(${loc.id},'mode','lumpsum')">Lump Sum (₹)</button>
          <button class="imb ${inst.mode==='percent'?'active':''}" onclick="upInst(${loc.id},'mode','percent')">% of Subtotal</button>
          <button class="imb ${inst.mode==='perunit'?'active':''}" onclick="upInst(${loc.id},'mode','perunit')">Per Unit (₹)</button>
        </div>
      </div>
      <div class="g3">
        ${inst.mode==='lumpsum'?`<div class="fr"><label class="lbl">Lump Sum Amount (₹)</label>
          <input class="fi" type="number" value="${inst.lumpsum||0}" oninput="upInst(${loc.id},'lumpsum',parseFloat(this.value)||0)"/></div>`:''}
        ${inst.mode==='percent'?`<div class="fr"><label class="lbl">% of Location Subtotal</label>
          <input class="fi" type="number" value="${inst.percent||0}" min="0" max="100" oninput="upInst(${loc.id},'percent',parseFloat(this.value)||0)"/>
          <div style="font-size:10px;color:#7a6010;margin-top:4px;">= ${fmtD(iSub*(inst.percent||0)/100)}</div></div>`:''}
        ${inst.mode==='perunit'?`<div class="fr"><label class="lbl">Rate per Unit (₹)</label>
          <input class="fi" type="number" value="${inst.perunit||0}" oninput="upInst(${loc.id},'perunit',parseFloat(this.value)||0)"/>
          <div style="font-size:10px;color:#7a6010;margin-top:4px;">Total qty: ${loc.items.reduce((s,it)=>s+(parseFloat(it.qty)||0),0)} · = ${fmtD(loc.items.reduce((s,it)=>s+(parseFloat(it.qty)||0),0)*(inst.perunit||0))}</div></div>`:''}
        <div class="fr" style="grid-column:${inst.mode==='lumpsum'?'2':'1'} / span 2"><label class="lbl">Installation Note / Description</label>
          <input class="fi" value="${escH(inst.note)}" placeholder="e.g. Floor preparation and tile fixing" oninput="upInst(${loc.id},'note',this.value)"/>
        </div>
      </div>
    </div>
    <div class="inst-total-row">
      <span style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#7a6010;">
        <i class="ti ti-tool" style="font-size:12px;margin-right:5px;vertical-align:-2px;"></i>
        Installation Charge ${inst.mode==='percent'?'('+fmt(inst.percent||0)+'%)':inst.mode==='perunit'?'(per unit)':'(lump sum)'}
      </span>
      <span id="inst-amt-${loc.id}" style="font-family:'Noto Serif JP',serif;font-size:15px;font-weight:300;color:#7a6010;">${fmtD(iAmt)}</span>
    </div>`:'';

  return `<div class="loc-block" id="loc-${loc.id}">
    <div class="loc-hdr">
      <div style="display:flex;align-items:center;gap:7px;flex:1;">
        <span class="loc-num">Location ${li+1}</span>
        <input class="fi-inline" style="flex:1;font-weight:500;" value="${escH(loc.name)}" placeholder="e.g. Ground Floor…" oninput="eq.locations[${li}].name=this.value"/>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:13px;" id="lhd-${loc.id}">${fmtD(lTot)}</span>
        ${li>0?`<button class="bi" onclick="rmLoc(${loc.id})"><i class="ti ti-trash"></i></button>`:''}
      </div>
    </div>
    <div class="loc-body">
      <table class="li-table">
        <thead><tr>
          <th style="width:46px;"></th><th>Item / Description</th>
          <th style="width:78px;">Brand</th><th style="width:50px;">Unit</th>
          <th style="width:108px;text-align:right;">Rate (₹)</th>
          <th style="width:70px;text-align:right;">Qty</th>
          <th style="width:76px;text-align:right;">Disc %</th>
          <th class="r" style="width:120px;">Total (₹)</th>
          <th style="width:30px;"></th>
        </tr></thead>
        <tbody id="tb-${loc.id}">${rows}</tbody>
        <tfoot><tr style="background:#f8f7f4;border-top:1px solid rgba(10,10,10,.1);">
          <td colspan="7" style="padding:7px 4px;font-size:11px;font-weight:500;">Material Subtotal — ${escH(loc.name)}</td>
          <td class="r" style="padding:7px 4px;font-family:'Noto Serif JP',serif;font-size:13px;" id="ls-${loc.id}">${fmtD(iSub)}</td>
          <td></td>
        </tr></tfoot>
      </table>
      <button class="ba" style="margin-top:9px;margin-bottom:10px;" onclick="showP(${loc.id})">
        <i class="ti ti-plus" style="font-size:14px;"></i> Add Item
      </button>

      <!-- Installation block -->
      ${inst.enabled
        ?`<div class="inst-block">${instContent}<div style="text-align:right;padding:4px 12px 8px;">
            <button class="bi" style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8a3030;" onclick="toggleInst(${loc.id},false)">
              <i class="ti ti-x" style="font-size:11px;"></i> Remove Installation
            </button>
          </div></div>`
        :`<button class="ba" style="border-color:rgba(185,175,120,.5);color:#7a6010;" onclick="toggleInst(${loc.id},true)">
            <i class="ti ti-tool" style="font-size:14px;"></i> Add Installation Charge for this Location
          </button>`}
    </div>

    <!-- Location total bar -->
    <div class="loc-total-row" id="ltrow-${loc.id}">
      <span class="lt-label">
        <i class="ti ti-map-pin" style="font-size:12px;margin-right:5px;vertical-align:-2px;"></i>
        Total — ${escH(loc.name)}${inst.enabled?' (incl. installation)':''}
      </span>
      <span class="lt-val" id="lt-tot-${loc.id}">${fmtD(lTot)}</span>
    </div>
  </div>`;
}

function toggleLocSel(locId){
  const loc=eq.locations.find(l=>l.id===locId);
  if(loc){ loc.selected=loc.selected===false?true:false; rerS(); }
}

function rCombinedToggle(q){
  // per-area selection checkboxes
  const areaRows=q.locations.map(function(loc){
    const sel=loc.selected!==false;
    const lT=locTotal(loc);
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(10,10,10,.06);">'
      +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;min-width:0;">'
      +'<input type="checkbox"'+(sel?' checked':'')
        +' onchange="toggleLocSel('+loc.id+')"'
        +' style="width:15px;height:15px;cursor:pointer;flex-shrink:0;accent-color:#0a0a0a;"/>'
      +'<span style="font-size:12px;font-weight:500;color:'+(sel?'#0a0a0a':'#bbb')+';">'+escH(loc.name)+'</span>'
      +(loc.installation&&loc.installation.enabled?'<span style="font-size:9px;color:#7a6010;margin-left:4px;"><i class="ti ti-tool" style="font-size:10px;vertical-align:-2px;"></i></span>':'')
      +'</label>'
      +'<span style="font-family:Georgia,serif;font-size:14px;font-weight:300;color:'+(sel?'#0a0a0a':'#ccc')+';">'+fmtD(lT)+'</span>'
      +'</div>';
  }).join('');

  // 3-way total mode — only shown if 2+ locations
  let modeSelector='';
  if(q.locations.length>1){
    const m=q.totalMode||'both';
    const opts=[
      ['grand','ti-sum','Grand Total Only','One combined total'],
      ['each','ti-map-pin','Each Area Total','No grand total'],
      ['both','ti-layout-list','Each + Grand Total','Both area & combined'],
    ];
    const btns=opts.map(function(o){
      const active=m===o[0]?'active':'';
      return '<button class="tm-btn '+active+'" onclick="eq.totalMode=\''+o[0]+'\';rerS()">'
        +'<i class="ti '+o[1]+'"></i>'
        +'<span class="tm-lbl">'+o[2]+'</span>'
        +'<span class="tm-desc">'+o[3]+'</span>'
        +'</button>';
    }).join('');
    modeSelector='<div style="margin-top:12px;">'
      +'<div style="font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:#aaa;margin-bottom:7px;">How to show totals</div>'
      +'<div class="tm-wrap">'+btns+'</div>'
      +'</div>';
  }

  return '<div style="margin-top:12px;">'
    +'<div style="font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:#aaa;margin-bottom:7px;">Areas included in this quote</div>'
    +'<div style="background:#fff;border:1px solid rgba(10,10,10,.1);padding:10px 14px;">'
    +'<div style="font-size:10px;color:#aaa;margin-bottom:8px;line-height:1.5;">Tick the areas the client wishes to proceed with. Only ticked areas are included in the total.</div>'
    +areaRows
    +'</div>'
    +modeSelector
    +'</div>';
}
function sumH(q){
  const iSub=qItemsSub(q),instT=qInstTotal(q),sub=qSub(q),gA=qGST(q),tr=parseFloat(q.transport)||0,grand=sub+gA+tr;
  const hasInst=q.locations.some(l=>l.installation&&l.installation.enabled);
  const m=q.totalMode||'both';
  const showEach=(m==='each'||m==='both')&&q.locations.length>1;
  const showGrand=m==='grand'||m==='both';
  const boqOn=q.showBoq!==false;

  // GST row
  let gstRow='';
  if(q.gstMode==='no'){
    gstRow=`<div class="sum-row" style="background:#f8f4e0;padding:6px 8px;"><span class="sum-label" style="color:#7a6010;font-size:11px;">No GST in this quote</span><span class="sum-val" style="color:#7a6010;font-size:11px;">—</span></div>`;
  } else if(q.gstMode==='incl'){
    gstRow=`<div class="sum-row gst"><span class="sum-label">GST @ ${q.gstPct}% (incl. in prices)</span><span class="sum-val" style="font-size:13px;">Included</span></div>`;
  } else {
    gstRow=`<div class="sum-row gst"><span class="sum-label">GST @ ${q.gstPct}%</span><span class="sum-val" style="font-size:13px;">${fmtD(gA)}</span></div>`;
  }

  // Area breakdown
  let areaBreak='';
  if(showEach){
    const rows=q.locations.map(loc=>{
      const lT=locTotal(loc);const inst=loc.installation;
      return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(10,10,10,.05);font-size:12px;">
        <span style="color:#555;">${escH(loc.name)}${inst&&inst.enabled?'<span style="font-size:9px;color:#7a6010;margin-left:5px;"><i class="ti ti-tool" style="font-size:10px;vertical-align:-2px;"></i></span>':''}</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:14px;">${fmtD(lT)}</span>
      </div>`;}).join('');
    areaBreak=`<div style="background:#fff;border:1px solid rgba(10,10,10,.06);padding:10px 12px;">
      <div style="font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:#aaa;margin-bottom:7px;">Area Totals</div>
      ${rows}
    </div>`;
  } else {
    areaBreak=`<div style="font-size:10px;color:#bbb;padding:8px 0;">Area breakdown shown in BOQ Summary</div>`;
  }

  // Grand total / no-grand note
  let grandRow='';
  if(showGrand){
    grandRow=`<div class="sum-row grand"><span class="sum-label">Grand Total${q.gstMode==='no'?' (excl. GST)':''}</span><span class="sum-val">${fmtD(grand)}</span></div>`;
  } else {
    grandRow=`<div style="background:#f8f4e0;border:1px solid #d4c060;padding:7px 10px;margin-top:6px;font-size:10px;color:#7a6010;"><i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:5px;font-size:12px;"></i>Grand total not shown — see area totals above</div>`;
  }

  return `${rCombinedToggle(q)}
  <div style="margin-top:12px;">
    <div style="font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:#aaa;margin-bottom:6px;">BOQ Summary Page</div>
    <div style="background:#fff;border:1px solid rgba(10,10,10,.1);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:500;margin-bottom:3px;">
          <i class="ti ti-file-description" style="font-size:14px;vertical-align:-2px;margin-right:6px;"></i>BOQ Summary prints as a separate cover page
        </div>
        <div style="font-size:10px;color:#888;line-height:1.6;">

function upIt(id,key,val){
  for(const loc of eq.locations){
    const it=loc.items.find(x=>x.id===id); if(!it) continue;
    it[key]=val;
    const ltv=lt(it), dA=it.rate*it.qty*(it.disc||0)/100;
    const le=document.getElementById('lt-'+id); if(le) le.textContent=fmtD(ltv);
    const de=document.getElementById('dl-'+id); if(de){de.textContent=dA>0?'− '+fmtD(dA):'';de.className=dA>0?'li-disc-lbl':'';}
    // update material subtotal
    const iS=itemsSub(loc);
    const lse=document.getElementById('ls-'+loc.id); if(lse) lse.textContent=fmtD(iS);
    // update installation if percent or perunit
    const inst=loc.installation;
    if(inst&&inst.enabled){
      const iA=instAmt(loc);
      const iae=document.getElementById('inst-amt-'+loc.id); if(iae) iae.textContent=fmtD(iA);
      const lte=document.getElementById('lt-tot-'+loc.id); if(lte) lte.textContent=fmtD(iS+iA);
      const lhe=document.getElementById('lhd-'+loc.id); if(lhe) lhe.textContent=fmtD(iS+iA);
    } else {
      const lte=document.getElementById('lt-tot-'+loc.id); if(lte) lte.textContent=fmtD(iS);
      const lhe=document.getElementById('lhd-'+loc.id); if(lhe) lhe.textContent=fmtD(iS);
    }
    rerS(); break;
  }
}

function upInst(locId,key,val){
  const loc=eq.locations.find(l=>l.id===locId); if(!loc) return;
  if(!loc.installation) loc.installation=defInst();
  loc.installation[key]=val;
  if(key==='mode'){ render(); return; } // full re-render when mode changes
  // live update amounts
  const iA=instAmt(loc), iS=itemsSub(loc), lT=iS+iA;
  const iae=document.getElementById('inst-amt-'+locId); if(iae) iae.textContent=fmtD(iA);

}

function upOpt(itemId,optId,key,val){
  for(const loc of eq.locations){
    const it=loc.items.find(x=>x.id===itemId);
    if(it&&it.options){
      const opt=it.options.find(o=>o.id===optId);

    }
  }
}

function makePrimary(itemId,optId){
  for(const loc of eq.locations){
    const it=loc.items.find(x=>x.id===itemId);
    if(it&&it.options){
      const optIdx=it.options.findIndex(o=>o.id===optId);
      if(optIdx<0) return;
      const opt=it.options[optIdx];
      // swap: current main becomes an option, chosen option becomes main
      const oldMain={id:uid(),name:it.name,brand:it.brand,unit:it.unit,rate:it.rate,image:it.image};
      it.name=opt.name; it.brand=opt.brand; it.unit=opt.unit; it.rate=opt.rate; it.image=opt.image;
      it.options.splice(optIdx,1,oldMain);
      render();return;
    }
  }
}

    <div class="pv-terms" style="margin-top:18px;">

function buildQuoteHTML(q,c){

  const col=mm=>`<col style="width:${mm}mm"/>`;
  const th=(mm,al,txt)=>`<th style="width:${mm}mm;text-align:${al};padding:5px 4px;font-size:7pt;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:400;border-bottom:1.5px solid #0a0a0a;white-space:nowrap;">${txt}</th>`;
  const td=(mm,al,cnt,extra)=>`<td style="width:${mm}mm;text-align:${al};padding:7px 4px;border-bottom:0.5px solid #eee;vertical-align:top;word-break:break-word;${extra||''}">${cnt}</td>`;
  const tBC={};q.terms.forEach(t=>{if(!tBC[t.cat])tBC[t.cat]=[];tBC[t.cat].push(t.text);});
  const hasInst=q.locations.some(l=>l.installation&&l.installation.enabled);
  const mm=q.totalMode||'both';
  const showGrandPDF=(mm==='grand'||mm==='both');

  const locs=q.locations.map(loc=>{
    const iS=itemsSub(loc),iA=instAmt(loc),lT=iS+iA;const inst=loc.installation;
    const rows=loc.items.map(it=>{const ltv=lt(it),dA=it.rate*it.qty*(it.disc||0)/100;
      const imgC=it.image?`<img src="${it.image}" style="width:28px;height:28px;object-fit:cover;border:0.5px solid #ccc;display:block;"/>`:
        `<div style="width:28px;height:28px;background:#f3f2ef;border:0.5px solid #ddd;"></div>`;
      const opts3=it.options||[];
      const optPdfRows=opts3.map(opt=>{const ot=opt.rate*(it.qty||0);
        const oImg=opt.image?`<img src="${opt.image}" style="width:28px;height:28px;object-fit:cover;border:0.5px solid #d4c060;display:block;"/>`:
          `<div style="width:28px;height:28px;background:#f8f4e0;border:0.5px solid #d4c060;"></div>`;
        return `<tr style="background:#fffdf5;">`
          +td(CW.img,'center',oImg,'background:#fffdf5;')
          +td(CW.item,'left','<span style="font-size:7pt;background:#f8f4e0;border:0.5px solid #d4c060;color:#7a6010;padding:1px 5px;letter-spacing:1px;margin-right:5px;">ALT</span><span style="font-size:9pt;color:#666;">'+escH(opt.name)+'</span>','background:#fffdf5;')
          +td(CW.brand,'left','<span style="color:#888;font-size:9pt;">'+escH(opt.brand||'—')+'</span>','background:#fffdf5;')
          +td(CW.unit,'center','<span style="color:#888;">'+((opt.unit||it.unit))+'</span>','background:#fffdf5;')
          +td(CW.rate,'right','<span style="color:#7a6010;font-size:9pt;">'+fmtC(opt.rate)+'</span>','background:#fffdf5;')
          +td(CW.qty,'right','<span style="color:#aaa;font-size:9pt;">'+fmt(it.qty)+'</span>','background:#fffdf5;')
          +td(CW.disc,'right','<span style="color:#aaa;font-size:8pt;">—</span>','background:#fffdf5;')
          +td(CW.total,'right','<span style="font-size:10pt;color:#7a6010;">'+fmtC(ot)+'</span><div style="font-size:7pt;color:#bbb;letter-spacing:1px;">not in total</div>','background:#fffdf5;')
          +'</tr>';}).join('');
      return `<tr>${td(CW.img,'center',imgC)}${td(CW.item,'left','<span style="font-weight:600;font-size:9pt;">'+escH(it.name)+'</span>')}${td(CW.brand,'left',escH(it.brand||'—'))}${td(CW.unit,'center',it.unit)}${td(CW.rate,'right',fmtC(it.rate))}${td(CW.qty,'right',fmt(it.qty))}${td(CW.disc,'right',(it.disc?it.disc+'%<br/><span style="color:#1a5a1a;font-size:8pt;">−'+fmtC(dA)+'</span>':'—'))}${td(CW.total,'right','<span style="font-size:11pt;font-weight:700;">'+fmtC(ltv)+'</span>')}</tr>${optPdfRows}`;}).join('');
    return `<div style="background:#0a0a0a;color:#fff;padding:5px 8px;font-size:7pt;letter-spacing:3px;text-transform:uppercase;margin:14px 0 0;">Location: ${escH(loc.name)}</div>
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:9pt;">
      <colgroup>${col(CW.img)}${col(CW.item)}${col(CW.brand)}${col(CW.unit)}${col(CW.rate)}${col(CW.qty)}${col(CW.disc)}${col(CW.total)}</colgroup>
      <thead><tr style="border-bottom:1.5px solid #0a0a0a;background:#fff;">${th(CW.img,'center','')}${th(CW.item,'left','Item / Description')}${th(CW.brand,'left','Brand')}${th(CW.unit,'center','Unit')}${th(CW.rate,'right','Rate (Rs.)')}${th(CW.qty,'right','Qty')}${th(CW.disc,'right','Disc')}${th(CW.total,'right','Total (Rs.)')}</tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#f8f7f4;border-top:1px solid #ddd;"><td colspan="7" style="padding:7px 4px;font-size:9pt;font-weight:600;">Material Subtotal — ${escH(loc.name)}</td><td style="padding:7px 4px;text-align:right;font-size:10pt;font-weight:600;">${fmtC(iS)}</td></tr>
        ${inst&&inst.enabled?`<tr style="background:#fffdf5;border-top:1px dashed #d4c060;"><td colspan="7" style="padding:7px 4px;font-size:9pt;color:#7a6010;">Installation${inst.note?' — '+escH(inst.note):''} (${inst.mode==='lumpsum'?'Lump sum':inst.mode==='percent'?fmt(inst.percent)+'% of subtotal':'Per unit @ '+fmtC(inst.perunit)})</td><td style="padding:7px 4px;text-align:right;font-size:10pt;color:#7a6010;font-weight:600;">${fmtC(iA)}</td></tr>`:''}
        <tr style="background:#0a0a0a;"><td colspan="7" style="padding:8px 4px;color:#fff;font-size:8pt;letter-spacing:2px;text-transform:uppercase;font-weight:600;">Total — ${escH(loc.name)}${inst&&inst.enabled?' (incl. installation)':''}</td><td style="padding:8px 4px;text-align:right;color:#fff;font-size:12pt;font-weight:700;">${fmtC(lT)}</td></tr>
      </tfoot>
    </table>`;}).join('');

  const termsH=Object.entries(tBC).map(([cat,txts])=>
    `<div style="font-size:7pt;letter-spacing:2px;text-transform:uppercase;color:#999;margin-top:10px;margin-bottom:3px;">${cat}</div>
    ${txts.map(t=>`<div style="font-size:9pt;color:#444;padding-left:8px;border-left:2px solid #ddd;margin-bottom:4px;line-height:1.6;">${escH(t)}</div>`).join('')}`).join('');

  const locBreak=((mm==='each'||mm==='both')&&q.locations.length>1)?`<div style="margin-bottom:14px;border:1px solid #eee;padding:10px 12px;">
    <div style="font-size:7pt;letter-spacing:2px;text-transform:uppercase;color:#999;margin-bottom:8px;">Summary by Location</div>
    ${q.locations.map(loc=>{const lT=locTotal(loc);const inst=loc.installation;return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #eee;font-size:9pt;"><span>${escH(loc.name)}${inst&&inst.enabled?' (+ installation)':''}</span><span style="font-weight:600;">${fmtC(lT)}</span></div>`;}).join('')}</div>`:'' ;

  const sumSection=`${locBreak}<table style="width:100%;border-collapse:collapse;font-size:9pt;margin-top:4px;border-top:2px solid #0a0a0a;">
    <tr><td style="padding:7px 4px;color:#555;width:75%;">Material Subtotal</td><td style="padding:7px 4px;text-align:right;font-size:10pt;">${fmtC(iSub)}</td></tr>
    ${hasInst?`<tr style="background:#fffdf5;"><td style="padding:7px 4px;color:#7a6010;">Total Installation</td><td style="padding:7px 4px;text-align:right;font-size:10pt;color:#7a6010;font-weight:600;">${fmtC(instT)}</td></tr>`:''}
    ${hasInst?`<tr style="background:#f8f7f4;"><td style="padding:7px 4px;font-weight:700;">Combined Subtotal</td><td style="padding:7px 4px;text-align:right;font-size:11pt;font-weight:700;">${fmtC(sub)}</td></tr>`:''}
    ${q.gstMode==='no'?`<tr style="background:#f8f4e0;"><td style="padding:7px 4px;color:#7a6010;">GST</td><td style="padding:7px 4px;text-align:right;color:#7a6010;font-size:9pt;">Not applicable for this quote</td></tr>`:
      q.gstMode==='incl'?`<tr style="background:#f0f4ff;"><td style="padding:7px 4px;color:#185fa5;">GST @ ${q.gstPct}% (included in item prices)</td><td style="padding:7px 4px;text-align:right;color:#185fa5;font-size:10pt;font-weight:600;">Included</td></tr>`:
      `<tr style="background:#f0f4ff;"><td style="padding:7px 4px;color:#185fa5;">GST @ ${q.gstPct}%</td><td style="padding:7px 4px;text-align:right;color:#185fa5;font-size:10pt;font-weight:600;">${fmtC(gA)}</td></tr>`}
    <tr><td style="padding:7px 4px;color:#555;">Transport ${q.transportNote?'('+escH(q.transportNote)+')':''}</td><td style="padding:7px 4px;text-align:right;font-size:10pt;">${fmtC(tr)}</td></tr>
    ${showGrandPDF?`<tr style="border-top:2px solid #0a0a0a;background:#f8f7f4;"><td style="padding:10px 4px;font-weight:700;font-size:11pt;">Grand Total${q.gstMode==='no'?' (excl. GST)':''}</td><td style="padding:10px 4px;text-align:right;font-size:16pt;font-weight:700;">${fmtC(grand)}</td></tr>`:''}
  </table>`;

  const logoH=q.companyLogo?`<img src="${q.companyLogo}" style="max-height:55px;max-width:150px;object-fit:contain;display:block;margin-bottom:6px;"/>`:
    `<div style="font-size:20pt;font-weight:300;letter-spacing:3px;font-family:Georgia,serif;">WATCON</div>`;

  return `<div style="padding:18px 16px;">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0a0a0a;padding-bottom:14px;margin-bottom:14px;">

      <div style="font-size:7pt;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-bottom:2px;">Quotation</div>

    ${termsH}

  <div style="margin-top:16px;border-top:1px solid #eee;padding-top:8px;font-size:8pt;color:#bbb;display:flex;justify-content:space-between;">

function buildBOQHTML(q,c){

    const sel=loc.selected!==false;

      <td colspan="2" style="padding:10px 8px;font-size:10pt;font-weight:700;letter-spacing:1px;border-top:1.5px solid ${sel?'#0a0a0a':'#ccc'};border-bottom:0.5px solid #ddd;color:${sel?'#0a0a0a':'#bbb'};">
        ${sel?'&#9655;':'&#9633;'} ${escH(loc.name)}${sel?'':'<span style="font-size:8pt;font-weight:400;margin-left:10px;color:#bbb;letter-spacing:1px;">— NOT INCLUDED</span>'}
      </td>
    </tr>
    ${materialItemRows}
    ${inst&&inst.enabled?`<tr style="background:#fffdf5;">
      <td style="padding:6px 8px 6px 24px;font-size:9pt;color:#7a6010;border-bottom:0.5px solid #f0efe9;">Installation${inst.note?' — '+escH(inst.note):''}</td>
      <td style="padding:6px 8px;text-align:right;font-size:9pt;color:#7a6010;border-bottom:0.5px solid #f0efe9;">${fmtC(iA)}</td>
    </tr>`:''}
    <tr style="background:${sel?'#0a0a0a':'#ccc'};">
      <td style="padding:9px 8px;color:#fff;font-size:10pt;font-weight:700;letter-spacing:1px;">Area Total — ${escH(loc.name)}${inst&&inst.enabled?' (incl. installation)':''}</td>
      <td style="padding:9px 8px;text-align:right;color:#fff;font-size:13pt;font-weight:700;">${fmtC(lT)}</td>
    </tr>
    <tr><td colspan="2" style="padding:8px 0;"></td></tr>`;}).join('');

  const summaryRows=`
    <tr style="border-top:2px solid #0a0a0a;">
      <td style="padding:8px 8px;color:#555;font-size:9pt;">Material Subtotal</td>

    ${hasInst?`<tr style="background:#f8f7f4;"><td style="padding:8px 8px;font-weight:700;font-size:10pt;">Combined Subtotal</td><td style="padding:8px 8px;text-align:right;font-size:11pt;font-weight:700;">${fmtC(sub)}</td></tr>`:''}
    ${q.gstMode==='no'?`<tr style="background:#f8f4e0;"><td style="padding:8px 8px;color:#7a6010;font-size:9pt;">GST</td><td style="padding:8px 8px;text-align:right;color:#7a6010;font-size:9pt;">Not applicable</td></tr>`:
      q.gstMode==='incl'?`<tr style="background:#f0f4ff;"><td style="padding:8px 8px;color:#185fa5;font-size:9pt;">GST @ ${q.gstPct}% (included in prices)</td><td style="padding:8px 8px;text-align:right;color:#185fa5;font-size:10pt;font-weight:700;">Included</td></tr>`:
      `<tr style="background:#f0f4ff;"><td style="padding:8px 8px;color:#185fa5;font-size:9pt;">GST @ ${q.gstPct}%</td><td style="padding:8px 8px;text-align:right;color:#185fa5;font-size:10pt;font-weight:700;">${fmtC(gA)}</td></tr>`}
    <tr><td style="padding:8px 8px;color:#555;font-size:9pt;">Transport ${q.transportNote?'('+escH(q.transportNote)+')':''}</td><td style="padding:8px 8px;text-align:right;font-size:10pt;">${fmtC(tr)}</td></tr>
    ${showGrand?`<tr style="background:#0a0a0a;border-top:2px solid #0a0a0a;">

  return `<div style="padding:20px 18px;">

      <div style="font-size:7pt;letter-spacing:4px;text-transform:uppercase;color:#aaa;margin-bottom:4px;">Bill of Quantities — Summary</div>

      ${q.rev>0?`<div style="font-size:8pt;color:#ba7517;letter-spacing:2px;margin-top:2px;">Revision ${q.rev}</div>`:''}
      <div style="font-size:8pt;color:#888;margin-top:3px;">Date: ${q.date}</div>
    </div>

  <!-- Client details box -->
  <table style="width:100%;border-collapse:collapse;margin-bottom:20px;border:1px solid #e8e6e0;">
    <tr style="background:#f8f7f4;">
      <td style="padding:10px 14px;width:50%;vertical-align:top;border-right:1px solid #e8e6e0;">
        <div style="font-size:7pt;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-bottom:6px;">Client</div>
        <div style="font-weight:700;font-size:12pt;margin-bottom:3px;">${escH(c.name)}</div>
        <div style="font-size:9pt;color:#666;line-height:1.7;">${escH(c.contact)}<br/>${escH(c.billingAddress)}</div>
      </td>

function doPrint(mode){

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${q.id}</title>

${body}
</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),700);
}


render();

  // expose functions for onclick handlers
  const _qFns=['goNew','goPrev','saveL','doPrint','openQ','doRevise','showNC',

    'rmIt','addOption','upInst','rmLoc','showP','toggleInst','cM','cPick',
    'tP','sNC','upIt','upOpt','rerS','render'];

    tP,sNC,upIt,upOpt,rerS,render};
  _qFns.forEach(k=>window[k]=_qLocals[k]);

  render();
}
</script>

<script>
function initCustomers(){

const fmt = n => new Intl.NumberFormat('en-IN',{maximumFractionDigits:2}).format(n);
const fmtC = n => '₹ ' + fmt(n);
const today = new Date().toISOString().split('T')[0];

// ── SEED DATA ──────────────────────────────────────────────────────────────────


// ── HELPERS ────────────────────────────────────────────────────────────────────
function initials(name){
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function custTotals(c){
  const totalBilled = c.challans.reduce((s,ch)=>s+ch.items.reduce((ss,it)=>ss+it.value,0),0);
  const totalPaid   = c.payments.reduce((s,p)=>s+p.amount,0);
  const discount    = c.postSaleDiscount||0;
  const outstanding = totalBilled - discount - totalPaid;
  return{totalBilled, totalPaid, discount, outstanding};
}

// ── STATE ──────────────────────────────────────────────────────────────────────
let view = 'list';         // list | detail | new | edit
let selectedCust = null;
let detailTab = 'running'; // running | info
let searchText = '';
let filterStatus = 'all';
const customers=CUSTOMERS;

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById('module-body');
  const ta  = document.getElementById('topbar-actions');
  if(view==='list'){
    ta.innerHTML = `<button class="bp" onclick="goNew()">+ New Customer</button>`;
    app.innerHTML = renderList();
  } else if(view==='detail'){
    ta.innerHTML = `
      <button class="bg bs" onclick="goEdit()"><i class="ti ti-pencil" style="margin-right:4px;font-size:13px;"></i>Edit</button>
      <button class="bg bs" onclick="goList()">← All Customers</button>`;
    app.innerHTML = renderDetail();
  } else if(view==='new'||view==='edit'){
    ta.innerHTML = '';
    app.innerHTML = renderForm();
  }
}

// ── LIST VIEW ──────────────────────────────────────────────────────────────────
function renderList(){
  const filtered = customers.filter(c=>{
    const ms = (c.name+' '+c.contact+' '+c.phone+' '+c.email+' '+c.id).toLowerCase().includes(searchText);
    const mf = filterStatus==='all'||c.status===filterStatus;
    return ms&&mf;
  });

  return `
  <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;">
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>

    <div class="ftabs">
      <button class="ftab ${filterStatus==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="ftab ${filterStatus==='active'?'active':''}" onclick="setFilter('active')">Active</button>

    </div>
    <span style="font-size:10px;color:#aaa;white-space:nowrap;">${filtered.length} customers</span>
  </div>

  ${filtered.length===0?'<div class="empty">No customers found</div>':
  `<div class="cust-grid">
    ${filtered.map(c=>{
      const t = custTotals(c);
      return `<div class="cust-card" onclick="goDetail('${c.id}')">
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;">

          <div style="flex:1;min-width:0;">
            <div class="cust-name">${c.name}</div>
            <div class="cust-id">${c.id}</div>
            <div class="cust-meta">
              <i class="ti ti-phone" style="font-size:11px;margin-right:3px;"></i>${c.phone}<br/>
              <i class="ti ti-mail" style="font-size:11px;margin-right:3px;"></i>${c.email}
            </div>
          </div>
          <span class="badge badge-${c.status==='active'?'active':'inactive'}">${c.status}</span>
        </div>
        ${c.gstin?`<span class="cust-tag">GST: ${c.gstin.slice(0,8)}…</span>`:''}
        <div class="cust-strip">
          <div class="cs-item">
            <div class="cs-val">${fmtC(t.totalBilled)}</div>

          </div>
          <div class="cs-item">
            <div class="cs-val ${t.outstanding>0?'outstanding':''}">${fmtC(Math.max(0,t.outstanding))}</div>
            <div class="cs-lbl">Outstanding</div>

      </div>`;
    }).join('')}
  </div>`}`;
}

    <div class="rb-footer" style="border-top:none;">

      <button class="copy-addr-btn" onclick="copyBillingToDelivery()"><i class="ti ti-copy" style="font-size:12px;margin-right:4px;"></i>Same as Billing</button>
    </div>

      <div class="frow" style="grid-column:1/-1;">
        <label class="lbl">Delivery Name / Site Name</label>

      </div>

        <label class="lbl">Delivery Address</label>
        <textarea class="field-textarea" id="f-deliveryAddress" placeholder="Full delivery / site address">${c.deliveryAddress}</textarea>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>Additional</span></div>
    <div class="frow">
      <label class="lbl">Internal Notes</label>
      <textarea class="field-textarea" id="f-notes" placeholder="Delivery preferences, special instructions…">${c.notes}</textarea>
    </div>
  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;margin-bottom:24px;">
    <button class="bg" onclick="${isEdit?'goDetail(\''+c.id+'\')':'goList()'}">Cancel</button>
    <button class="bp" onclick="saveForm()">${isEdit?'Save Changes →':'Create Customer →'}</button>
  </div>`;
}

// ── ACTIONS ────────────────────────────────────────────────────────────────────
function goList(){ view='list'; render(); }
function goNew(){ view='new'; selectedCust=null; render(); }
function goDetail(id){
  selectedCust = customers.find(c=>c.id===id);
  detailTab='running'; view='detail'; render();
}
function goEdit(){
  view='edit'; render();
}
function setDetailTab(t){ detailTab=t; render(); }
function onSearch(v){ searchText=v.toLowerCase(); render(); }
function setFilter(f){ filterStatus=f; render(); }

function copyBillingToDelivery(){
  const bn = document.getElementById('f-billingName');
  const ba = document.getElementById('f-billingAddress');
  const dn = document.getElementById('f-deliveryName');
  const da = document.getElementById('f-deliveryAddress');
  if(bn&&dn){ dn.value=bn.value; da.value=ba.value; }
}

function saveForm(){
  const isEdit = view==='edit';
  const name    = document.getElementById('f-name').value.trim();
  const contact = document.getElementById('f-contact').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const status  = document.getElementById('f-status').value;
  const gstin   = document.getElementById('f-gstin').value.trim();
  const pan     = document.getElementById('f-pan').value.trim();
  const billingName    = document.getElementById('f-billingName').value.trim();
  const billingAddress = document.getElementById('f-billingAddress').value.trim();
  const deliveryName   = document.getElementById('f-deliveryName').value.trim();
  const deliveryAddress= document.getElementById('f-deliveryAddress').value.trim();
  const notes   = document.getElementById('f-notes').value.trim();

  if(!name){ alert('Customer name is required'); return; }
  if(!phone){ alert('Phone number is required'); return; }

  if(isEdit){
    const idx = customers.findIndex(c=>c.id===selectedCust.id);
    customers[idx] = {...selectedCust, name, contact, phone, email, status, gstin, pan, billingName, billingAddress, deliveryName, deliveryAddress, notes,
      sameAsDelivery: billingAddress===deliveryAddress && billingName===deliveryName};
    selectedCust = customers[idx];
    view='detail'; render();
  } else {
    const newId = 'CUST-' + String(customers.length+1).padStart(3,'0');
    const newC = {id:newId, name, contact, phone, email, status, gstin, pan, billingName:billingName||name, billingAddress, deliveryName:deliveryName||name, deliveryAddress:deliveryAddress||billingAddress,
      sameAsDelivery: billingAddress===deliveryAddress, notes, challans:[], postSaleDiscount:0, payments:[]};
    customers.unshift(newC);
    selectedCust = newC; detailTab='info'; view='detail'; render();
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────────
render();

  window.goNew=goNew; window.goEdit=goEdit; window.goList=goList;
  window.setFilter=setFilter; window.goDetail=goDetail;
  window.setDetailTab=setDetailTab; window.saveForm=saveForm;
  window.copyBillingToDelivery=copyBillingToDelivery; window.onSearch=onSearch;
  _cleanupFn=function(){
    ['goNew','goEdit','goList','setFilter','goDetail','setDetailTab',
     'saveForm','copyBillingToDelivery','onSearch'].forEach(k=>delete window[k]);
  };
  render();
}
</script>

// ── Calc import price ──────────────────────────────────────────────
function calcImport(f){
  const base=parseFloat(f.importPrice||0)*parseFloat(f.exchangeRate||1);
  const afterDisc=base*(1-parseFloat(f.discount||0)/100);
  const tc=f.transportType==='lumpsum'?parseFloat(f.transport||0):afterDisc*parseFloat(f.transport||0)/100;
  const wt=afterDisc+tc;
  const wd=wt*(1+parseFloat(f.customDuty||0)/100);
  const sell=wd*parseFloat(f.profitMultiplier||1);
  return{base,afterDisc,tc,wt,wd,sell};
}

}

// ── Price Calculator (editable) ────────────────────────────────────
function PriceCalc({form,setForm,editable}){
  const up=(k,v)=>setForm&&setForm(f=>({...f,[k]:v}));

      e(FSelect,{label:'Transport Mode',value:form.transportType,onChange:dis?null:v=>up('transportType',v),disabled:dis,opts:[['lumpsum','Lump Sum (₹)'],['percent','% of Cost After Discount']]}),
      e(FInput,{label:'Transport '+(form.transportType==='lumpsum'?'(₹)':'(%)'),value:form.transport,onChange:dis?null:v=>up('transport',v),disabled:dis,type:'number',placeholder:'0'}),
      e(FInput,{label:'Custom Duty %',value:form.customDuty,onChange:dis?null:v=>up('customDuty',v),disabled:dis,type:'number',placeholder:'0'}),

        e('div',{className:'serif',style:{fontSize:20,color:'#0a0a0a'}},fmtC(Math.round(r.sell))),
        e('div',{style:{fontSize:9,color:'#aaa',marginTop:4}},'per '+(form.unit||'unit'))

      ...([['Base INR',Math.round(r.base)],['After Discount',Math.round(r.afterDisc)],['+ Transport',Math.round(r.tc)],['+ Duty',Math.round(r.wd-r.wt)],['Cost Price',Math.round(r.wd)],['Sell Price',Math.round(r.sell)]]).map(([l,v])=>

      )
    )

}

function ItemDetail({item,allItems,role,onBack,onUpdate,onStockAdjust}){

  const [dateFrom,setDateFrom]=useState(d90);
  const [dateTo,setDateTo]=useState(today);

  const fileRef=useRef();
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  const isAdmin=role==='admin';

  // reset form when item changes
  useEffect(()=>{setForm({...item});setEditing(false);},[item.id]);

  const filtered=item.history.filter(h=>h.date>=dateFrom&&h.date<=dateTo);
  const totalQty=filtered.reduce((s,h)=>s+h.qty,0);
  const totalVal=filtered.reduce((s,h)=>s+h.value,0);

    let pp=parseFloat(form.purchasePrice)||0;

      const r=calcImport(form);

        isAdmin&&e('div',{className:'panel'},
          e('div',{className:'panel-title'},e('span',null,'Stock')),
          e('div',{className:'serif',style:{fontSize:24,marginBottom:4}},fmt(item.stock)),
          e('div',{style:{fontSize:10,color:'#aaa',marginBottom:10}},'units in hand'),

      e('div',null,
        // name + basic

            )

            e('input',{className:'field-input',value:form.name,disabled:!editing,onChange:ev=>up('name',ev.target.value),style:{fontSize:14}})
          ),
          e('div',{className:'g2',style:{marginBottom:12}},
            e(FInput,{label:'Brand',value:form.brand,onChange:editing?v=>up('brand',v):null,disabled:!editing}),
            e(FSelect,{label:'Unit',value:form.unit,onChange:editing?v=>up('unit',v):null,disabled:!editing,opts:['SQM','SQF','PCS','BOX','KG','MTR','LTR','SET','NOS']}),
            e(FInput,{label:'Delivery (days)',value:form.deliveryDays,onChange:editing?v=>up('deliveryDays',v):null,disabled:!editing,type:'number'}),
            e('div',null,

            e(FInput,{label:'Purchase Price (₹) per '+form.unit,value:form.purchasePrice,onChange:editing?v=>up('purchasePrice',v):null,disabled:!editing,type:'number'}),
            e(FInput,{label:'Selling Price (₹) per '+form.unit,value:form.sellingPrice,onChange:editing?v=>up('sellingPrice',v):null,disabled:!editing,type:'number'})

        form.isImported&&e(PriceCalc,{form,setForm:editing?setForm:null,editable:editing}),

        // metrics row
        e('div',{className:'g4',style:{marginBottom:14}},
          ...([
            {l:'Sell Price',v:fmtC(item.sellingPrice)+'/'+item.unit},

            {l:'Delivery',v:item.deliveryDays+' days'},

        )
      )
    ),

    // report
    e('div',{className:'panel'},
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,paddingBottom:10,borderBottom:'1px solid rgba(10,10,10,0.07)'}},
        e('span',{style:{fontSize:8,letterSpacing:'0.45em',textTransform:'uppercase',color:'#aaa'}},'Stock Movement Report'),
        e('div',{style:{display:'flex',gap:10,alignItems:'center',fontSize:10,color:'#aaa'}},
          'From',
          e('input',{type:'date',value:dateFrom,onChange:ev=>setDateFrom(ev.target.value),style:{border:'1px solid rgba(10,10,10,0.15)',padding:'5px 8px',fontSize:11,fontFamily:'inherit',outline:'none'}}),
